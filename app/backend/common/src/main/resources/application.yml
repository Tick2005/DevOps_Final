server:
  port: ${PORT:8080}

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/productx_db}
    username: ${SPRING_DATASOURCE_USERNAME:productx_user}
    password: ${SPRING_DATASOURCE_PASSWORD:SecurePassword123!}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: false

app:
  tier: ${APP_TIER:common}
  exam-tier: ${APP_EXAM_TIER:}
  version: ${APP_VERSION:v1.0.0}

