server:
  port: ${PORT:8080}

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/productx_db}
    username: ${SPRING_DATASOURCE_USERNAME:productx_user}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: false

app:
  tier: ${APP_TIER:common}
  exam-tier: ${APP_EXAM_TIER:}
  version: ${APP_VERSION:v1.0.0}


# Actuator and Metrics Configuration
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
      base-path: /actuator
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
    prometheus:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
    distribution:
      percentiles-histogram:
        http.server.requests: true
    tags:
      application: ${spring.application.name:productx-backend}
      namespace: ${APP_TIER:kubernetes}
      version: ${APP_VERSION:v1.0.0}
  health:
    livenessState:
      enabled: true
    readinessState:
      enabled: true
