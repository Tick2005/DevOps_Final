# =============================================================================
# DEPLOY-STAGING.YML - Staging Environment Deployment
# =============================================================================
# Trigger: Tự động chạy khi "Build & Release Docker" thành công
# Purpose: Deploy to staging environment for testing before production
# =============================================================================

name: Deploy to Staging

on:
  workflow_run:
    workflows: ["Build & Release Docker"]
    types:
      - completed
  
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Docker image tag to deploy (default: latest)'
        required: false
        default: 'latest'
      reason:
        description: 'Reason for manual deployment'
        required: false
        default: 'Manual trigger'

env:
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
  AWS_REGION: ap-southeast-1
  STAGING_NAMESPACE: productx-staging

jobs:
  # ===========================================================================
  # JOB: DEPLOY TO STAGING
  # ===========================================================================
  deploy-staging:
    name: Deploy to Staging Environment
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    
    environment:
      name: staging
      url: https://staging.tranduchuy.site

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.ref || github.event.workflow_run.head_sha }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure kubectl
        run: |
          echo "⚙️ Configuring kubectl for EKS..."
          aws eks update-kubeconfig --name ${{ secrets.EKS_CLUSTER_NAME }} --region ${{ env.AWS_REGION }}
          kubectl version --client
          kubectl cluster-info

      - name: Create Staging Namespace
        run: |
          echo "📦 Creating staging namespace..."
          kubectl create namespace ${{ env.STAGING_NAMESPACE }} --dry-run=client -o yaml | kubectl apply -f -
          echo "✅ Staging namespace ready"

      - name: Apply Staging ConfigMap
        run: |
          echo "⚙️ Applying staging configuration..."
          
          # Try to get DB and NFS IPs from production configmap
          DB_HOST=$(kubectl get configmap app-config -n productx -o jsonpath='{.data.DB_HOST}' 2>/dev/null || echo "")
          NFS_SERVER=$(kubectl get configmap app-config -n productx -o jsonpath='{.data.NFS_SERVER}' 2>/dev/null || echo "")
          
          # If production configmap doesn't exist, use placeholder values
          if [ -z "$DB_HOST" ]; then
            echo "⚠️ Production configmap not found, using placeholder DB_HOST"
            DB_HOST="postgres-service.productx.svc.cluster.local"
          fi
          
          if [ -z "$NFS_SERVER" ]; then
            echo "⚠️ Production configmap not found, using placeholder NFS_SERVER"
            NFS_SERVER="nfs-server.productx.svc.cluster.local"
          fi
          
          echo "📋 Using DB_HOST: $DB_HOST"
          echo "📋 Using NFS_SERVER: $NFS_SERVER"
          
          # For staging, use same database as production (Spring Boot will create tables automatically)
          # This is acceptable for testing purposes
          cat <<EOF | kubectl apply -f -
          apiVersion: v1
          kind: ConfigMap
          metadata:
            name: app-config
            namespace: ${{ env.STAGING_NAMESPACE }}
          data:
            DB_HOST: "$DB_HOST"
            DB_PORT: "5432"
            DB_NAME: "productx_staging"
            NFS_SERVER: "$NFS_SERVER"
            NFS_PATH: "/mnt/nfs_share"
            APP_ENV: "staging"
          EOF
          
          echo "✅ Staging ConfigMap applied (using production database)"
          echo "ℹ️  Staging shares database with production for testing"

      - name: Apply Staging Secrets
        run: |
          echo "🔐 Applying staging secrets..."
          
          cat <<EOF | kubectl apply -f -
          apiVersion: v1
          kind: Secret
          metadata:
            name: app-secrets
            namespace: ${{ env.STAGING_NAMESPACE }}
          type: Opaque
          stringData:
            DB_PASSWORD: "${{ secrets.DB_PASSWORD }}"
          EOF
          
          echo "✅ Staging Secrets applied"

      - name: Update Deployment Images
        run: |
          # Determine image tag based on trigger type
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            IMAGE_TAG="${{ github.event.inputs.image_tag }}"
            echo "🔧 Manual deployment triggered"
            echo "📦 Using image tag: $IMAGE_TAG"
          else
            COMMIT_SHA="${{ github.event.workflow_run.head_sha }}"
            SHORT_SHA=$(echo "$COMMIT_SHA" | cut -c1-7)
            IMAGE_TAG="sha-${SHORT_SHA}"
            echo "🤖 Automatic deployment triggered"
            echo "📦 Using image tag: $IMAGE_TAG"
          fi
          
          # Copy deployment files for staging
          cp -r kubernetes/base staging-deploy
          
          # Update backend deployment for staging
          sed -i "s|DOCKER_USERNAME|${{ env.DOCKER_USERNAME }}|g" staging-deploy/backend/deployment.yaml
          sed -i "s|PLACEHOLDER_IMAGE_TAG|${IMAGE_TAG}|g" staging-deploy/backend/deployment.yaml
          sed -i "s|namespace: productx|namespace: ${{ env.STAGING_NAMESPACE }}|g" staging-deploy/backend/deployment.yaml
          
          # Update backend service for staging
          sed -i "s|namespace: productx|namespace: ${{ env.STAGING_NAMESPACE }}|g" staging-deploy/backend/service.yaml
          
          # Update frontend deployment for staging
          sed -i "s|DOCKER_USERNAME|${{ env.DOCKER_USERNAME }}|g" staging-deploy/frontend/deployment.yaml
          sed -i "s|PLACEHOLDER_IMAGE_TAG|${IMAGE_TAG}|g" staging-deploy/frontend/deployment.yaml
          sed -i "s|namespace: productx|namespace: ${{ env.STAGING_NAMESPACE }}|g" staging-deploy/frontend/deployment.yaml
          
          # Update frontend service for staging
          sed -i "s|namespace: productx|namespace: ${{ env.STAGING_NAMESPACE }}|g" staging-deploy/frontend/service.yaml
          
          # Reduce replicas for staging (save resources)
          sed -i "s|replicas: 2|replicas: 1|g" staging-deploy/backend/deployment.yaml
          sed -i "s|replicas: 2|replicas: 1|g" staging-deploy/frontend/deployment.yaml
          
          echo "✅ Image tags updated to: ${IMAGE_TAG}"

      - name: Verify Staging Configuration
        run: |
          echo "🔍 Verifying staging configuration..."
          
          echo "📋 ConfigMap:"
          kubectl get configmap app-config -n ${{ env.STAGING_NAMESPACE }} -o yaml
          
          echo ""
          echo "📋 Secrets (names only):"
          kubectl get secret app-secrets -n ${{ env.STAGING_NAMESPACE }}
          
          echo ""
          echo "✅ Configuration verified"

      - name: Deploy to Staging
        run: |
          set -e
          
          echo "🚀 Deploying to Staging Environment..."
          
          # Deploy backend
          echo "📦 Deploying Backend..."
          kubectl apply -f staging-deploy/backend/deployment.yaml
          kubectl apply -f staging-deploy/backend/service.yaml
          
          # Deploy frontend
          echo "📦 Deploying Frontend..."
          kubectl apply -f staging-deploy/frontend/deployment.yaml
          kubectl apply -f staging-deploy/frontend/service.yaml
          
          echo "✅ Staging deployment manifests applied!"

      - name: Monitor Deployment Progress
        run: |
          echo "⏳ Monitoring deployment progress..."
          
          # Wait for rollout with longer timeout
          echo ""
          echo "📊 Backend deployment status:"
          kubectl rollout status deployment/backend -n ${{ env.STAGING_NAMESPACE }} --timeout=600s || {
            echo ""
            echo "❌ Backend deployment failed. Checking details..."
            echo ""
            echo "📊 Pod Status:"
            kubectl get pods -l app=backend -n ${{ env.STAGING_NAMESPACE }} -o wide
            echo ""
            echo "📋 Pod Events:"
            kubectl get events -n ${{ env.STAGING_NAMESPACE }} --sort-by='.lastTimestamp' | grep backend | tail -20
            echo ""
            echo "📋 Pod Logs:"
            kubectl logs -l app=backend -n ${{ env.STAGING_NAMESPACE }} --tail=50 || echo "No logs available"
            echo ""
            echo "📋 Pod Description:"
            POD_NAME=$(kubectl get pods -l app=backend -n ${{ env.STAGING_NAMESPACE }} -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || echo "")
            if [ -n "$POD_NAME" ]; then
              kubectl describe pod $POD_NAME -n ${{ env.STAGING_NAMESPACE }}
            fi
            exit 1
          }
          
          echo ""
          echo "📊 Frontend deployment status:"
          kubectl rollout status deployment/frontend -n ${{ env.STAGING_NAMESPACE }} --timeout=600s || {
            echo ""
            echo "❌ Frontend deployment failed. Checking details..."
            echo ""
            echo "📊 Pod Status:"
            kubectl get pods -l app=frontend -n ${{ env.STAGING_NAMESPACE }} -o wide
            echo ""
            echo "📋 Pod Logs:"
            kubectl logs -l app=frontend -n ${{ env.STAGING_NAMESPACE }} --tail=50 || echo "No logs available"
            exit 1
          }
          
          echo ""
          echo "✅ All deployments completed successfully!"

      - name: Wait for Pods to be Ready
        run: |
          echo "⏳ Waiting for staging pods to be ready..."
          
          kubectl wait --for=condition=ready pod \
            -l app=backend \
            -n ${{ env.STAGING_NAMESPACE }} \
            --timeout=300s
          
          kubectl wait --for=condition=ready pod \
            -l app=frontend \
            -n ${{ env.STAGING_NAMESPACE }} \
            --timeout=300s
          
          echo "✅ All staging pods are ready!"
          
          # Additional wait for application startup
          echo "⏳ Waiting additional 30 seconds for application initialization..."
          sleep 30
          
          # Check pod logs for startup confirmation
          echo "📋 Checking backend pod logs..."
          kubectl logs -l app=backend -n ${{ env.STAGING_NAMESPACE }} --tail=20 || true

      - name: Run Staging Tests
        id: staging_tests
        run: |
          echo "🧪 Running Staging Tests..."
          echo "Testing via internal service (backend-svc:8080/api)"
          
          # Use internal service endpoint with /api prefix
          API_BASE="http://backend-svc:8080/api"
          
          # Create a test pod to run curl commands
          echo "Creating test pod..."
          kubectl run staging-test-pod --image=curlimages/curl:latest -n ${{ env.STAGING_NAMESPACE }} --restart=Never --rm -i -- sh -c "
            echo '🧪 Running Staging CRUD Tests'
            echo ''
            
            # Test 1: Health Check
            echo 'Test 1: GET /actuator/health'
            HEALTH=\$(curl -s http://backend-svc:8080/actuator/health)
            echo \"Response: \$HEALTH\"
            
            if echo \"\$HEALTH\" | grep -q 'UP\|status'; then
              echo '✅ Test 1 PASSED: Backend is healthy'
            else
              echo '❌ Test 1 FAILED: Backend health check failed'
              exit 1
            fi
            
            # Test 2: List all products
            echo ''
            echo 'Test 2: GET /api/products'
            PRODUCTS=\$(curl -s $API_BASE/products)
            echo \"Response (first 500 chars): \$(echo \"\$PRODUCTS\" | head -c 500)...\"
            
            if echo \"\$PRODUCTS\" | grep -q 'id'; then
              echo '✅ Test 2 PASSED: Can list products'
            else
              echo '❌ Test 2 FAILED: Cannot list products'
              exit 1
            fi
            
            # Extract first product ID from the list
            FIRST_PRODUCT_ID=\$(echo \"\$PRODUCTS\" | grep -o '\"id\":[0-9]*' | head -n1 | grep -o '[0-9]*')
            echo \"First product ID found: \$FIRST_PRODUCT_ID\"
            
            if [ -z \"\$FIRST_PRODUCT_ID\" ]; then
              echo '❌ Failed to extract product ID from list'
              exit 1
            fi
            
            # Test 3: Get single product
            echo ''
            echo \"Test 3: GET /api/products/\$FIRST_PRODUCT_ID\"
            PRODUCT=\$(curl -s $API_BASE/products/\$FIRST_PRODUCT_ID)
            echo \"Response: \$PRODUCT\"
            
            if echo \"\$PRODUCT\" | grep -q 'id'; then
              echo '✅ Test 3 PASSED: Can get single product'
            else
              echo '❌ Test 3 FAILED: Cannot get single product'
              exit 1
            fi
            
            # Test 4: Create new product
            echo ''
            echo 'Test 4: POST /api/products'
            NEW_PRODUCT=\$(curl -s -X POST $API_BASE/products \
              -H 'Content-Type: application/json' \
              -d '{
                \"name\": \"Staging Test Product\",
                \"price\": 99.99,
                \"color\": \"Blue\",
                \"category\": \"Test\",
                \"stock\": 10,
                \"description\": \"Created by staging test\",
                \"image\": \"https://via.placeholder.com/150\"
              }')
            
            echo \"Response: \$NEW_PRODUCT\"
            
            if echo \"\$NEW_PRODUCT\" | grep -q 'Staging Test Product'; then
              echo '✅ Test 4 PASSED: Can create product'
              
              # Extract product ID
              PRODUCT_ID=\$(echo \"\$NEW_PRODUCT\" | grep -o '\"id\":[0-9]*' | grep -o '[0-9]*')
              echo \"Created product ID: \$PRODUCT_ID\"
              
              if [ -z \"\$PRODUCT_ID\" ]; then
                echo '❌ Failed to extract product ID'
                exit 1
              fi
              
              # Test 5: Update product
              echo ''
              echo \"Test 5: PUT /api/products/\$PRODUCT_ID\"
              UPDATED_PRODUCT=\$(curl -s -X PUT $API_BASE/products/\$PRODUCT_ID \
                -H 'Content-Type: application/json' \
                -d '{
                  \"name\": \"Updated Staging Test Product\",
                  \"price\": 149.99,
                  \"color\": \"Red\",
                  \"category\": \"Test\",
                  \"stock\": 20,
                  \"description\": \"Updated by staging test\",
                  \"image\": \"https://via.placeholder.com/150\"
                }')
              
              echo \"Response: \$UPDATED_PRODUCT\"
              
              if echo \"\$UPDATED_PRODUCT\" | grep -q 'Updated Staging Test Product'; then
                echo '✅ Test 5 PASSED: Can update product'
              else
                echo '❌ Test 5 FAILED: Cannot update product'
                exit 1
              fi
              
              # Test 6: Delete product
              echo ''
              echo \"Test 6: DELETE /api/products/\$PRODUCT_ID\"
              HTTP_CODE=\$(curl -s -o /dev/null -w '%{http_code}' -X DELETE $API_BASE/products/\$PRODUCT_ID)
              
              if [ \"\$HTTP_CODE\" = '204' ]; then
                echo \"✅ Test 6 PASSED: Can delete product (HTTP \$HTTP_CODE)\"
              else
                echo \"❌ Test 6 FAILED: Cannot delete product (HTTP \$HTTP_CODE)\"
                exit 1
              fi
            else
              echo '❌ Test 4 FAILED: Cannot create product'
              exit 1
            fi
            
            echo ''
            echo '🎉 All staging tests PASSED!'
          "
          
          echo ""
          echo "✅ Staging tests completed successfully!"

      - name: Rollback Staging on Failure
        if: failure() && steps.staging_tests.outcome == 'failure'
        run: |
          echo "🔄 Rolling back staging deployment..."
          kubectl rollout undo deployment/backend -n ${{ env.STAGING_NAMESPACE }}
          kubectl rollout undo deployment/frontend -n ${{ env.STAGING_NAMESPACE }}
          echo "✅ Staging rollback completed"

      - name: Print Staging Summary
        run: |
          echo "============================================="
          echo "🎉 STAGING DEPLOYMENT COMPLETED!"
          echo "============================================="
          echo "Namespace: ${{ env.STAGING_NAMESPACE }}"
          echo ""
          echo "📊 Pods:"
          kubectl get pods -n ${{ env.STAGING_NAMESPACE }}
          echo ""
          echo "📊 Services:"
          kubectl get svc -n ${{ env.STAGING_NAMESPACE }}
          echo ""
          echo "Access staging backend:"
          echo "  kubectl port-forward -n ${{ env.STAGING_NAMESPACE }} svc/backend-svc 8080:8080"
          echo "  http://localhost:8080"
          echo ""
          echo "Access staging frontend:"
          echo "  kubectl port-forward -n ${{ env.STAGING_NAMESPACE }} svc/frontend-svc 3000:80"
          echo "  http://localhost:3000"
          echo "============================================="

  # ===========================================================================
  # JOB: PROMOTE TO PRODUCTION (Manual Approval Required)
  # ===========================================================================
  promote-to-production:
    name: Promote to Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: success()
    
    environment:
      name: production-approval
      url: https://www.tranduchuy.site

    steps:
      - name: Promotion Approved
        run: |
          echo "============================================="
          echo "✅ STAGING TESTS PASSED"
          echo "============================================="
          echo ""
          echo "Staging deployment has been tested and approved."
          echo "Ready to promote to production."
          echo ""
          echo "The production deployment workflow will be triggered automatically."
          echo "============================================="
      
      - name: Trigger Production Deployment
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'deploy-cd.yml',
              ref: context.ref,
              inputs: {
                image_tag: '${{ github.event.workflow_run.head_sha }}',
                reason: 'Promoted from staging after successful tests'
              }
            });
            
            console.log('✅ Production deployment triggered!');
