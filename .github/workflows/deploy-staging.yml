# =============================================================================
# DEPLOY-STAGING.YML - Staging Environment Deployment
# =============================================================================
# Trigger: Tự động chạy khi "Build & Release Docker" thành công
# Purpose: Deploy to staging environment for testing before production
# =============================================================================

name: Deploy to Staging

on:
  workflow_run:
    workflows: ["Build & Release Docker"]
    types:
      - completed
  
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Docker image tag to deploy (default: latest)'
        required: false
        default: 'latest'
      reason:
        description: 'Reason for manual deployment'
        required: false
        default: 'Manual trigger'

env:
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
  AWS_REGION: ap-southeast-1
  STAGING_NAMESPACE: productx-staging

jobs:
  # ===========================================================================
  # JOB: DEPLOY TO STAGING
  # ===========================================================================
  deploy-staging:
    name: Deploy to Staging Environment
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    
    environment:
      name: staging
      url: https://staging.tranduchuy.site

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.ref || github.event.workflow_run.head_sha }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure kubectl
        run: |
          echo "⚙️ Configuring kubectl for EKS..."
          aws eks update-kubeconfig --name ${{ secrets.EKS_CLUSTER_NAME }} --region ${{ env.AWS_REGION }}
          kubectl version --client
          kubectl cluster-info

      - name: Generate Image Tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            IMAGE_TAG="${{ github.event.inputs.image_tag }}"
            echo "🔧 Manual deployment triggered"
            echo "📦 Using image tag: $IMAGE_TAG"
          else
            COMMIT_SHA="${{ github.event.workflow_run.head_sha }}"
            SHORT_SHA=$(echo "$COMMIT_SHA" | cut -c1-7)
            IMAGE_TAG="sha-${SHORT_SHA}"
            echo "🤖 Automatic deployment triggered"
            echo "📦 Using image tag: $IMAGE_TAG"
          fi
          
          echo "image_tag=${IMAGE_TAG}" >> $GITHUB_OUTPUT

      - name: Update Deployment Images
        run: |
          IMAGE_TAG="${{ steps.tag.outputs.image_tag }}"
          
          # Update backend deployment
          cat kubernetes/base/backend/deployment.yaml | \
            sed "s|DOCKER_USERNAME|${{ env.DOCKER_USERNAME }}|g" | \
            sed "s|PLACEHOLDER_IMAGE_TAG|${IMAGE_TAG}|g" | \
            sed "s|namespace: productx|namespace: ${{ env.STAGING_NAMESPACE }}|g" | \
            sed "s|replicas: 2|replicas: 1|g" > /tmp/backend-deployment.yaml
          
          # Update frontend deployment
          cat kubernetes/base/frontend/deployment.yaml | \
            sed "s|DOCKER_USERNAME|${{ env.DOCKER_USERNAME }}|g" | \
            sed "s|PLACEHOLDER_IMAGE_TAG|${IMAGE_TAG}|g" | \
            sed "s|namespace: productx|namespace: ${{ env.STAGING_NAMESPACE }}|g" | \
            sed "s|replicas: 2|replicas: 1|g" > /tmp/frontend-deployment.yaml
          
          echo "✅ Image tags updated to: ${IMAGE_TAG}"

      - name: Deploy to Staging
        run: |
          set -e
          
          echo "🚀 Deploying to Staging Environment..."
          
          # Deploy backend
          echo "📦 Deploying Backend..."
          kubectl apply -f /tmp/backend-deployment.yaml
          
          # Deploy frontend
          echo "📦 Deploying Frontend..."
          kubectl apply -f /tmp/frontend-deployment.yaml
          
          echo "✅ Staging deployment manifests applied!"

      - name: Wait for Deployment
        run: |
          echo "⏳ Waiting for deployments to be ready..."
          kubectl rollout status deployment/backend -n ${{ env.STAGING_NAMESPACE }} --timeout=600s
          kubectl rollout status deployment/frontend -n ${{ env.STAGING_NAMESPACE }} --timeout=600s
          
          echo "✅ All deployments completed successfully!"

      - name: Verify Staging Deployment
        run: |
          echo ""
          echo "============================================="
          echo "📊 STAGING DEPLOYMENT STATUS"
          echo "============================================="
          echo ""
          echo "� Pods:"
          kubectl get pods -n ${{ env.STAGING_NAMESPACE }} -o wide
          echo ""
          echo "🔹 Services:"
          kubectl get svc -n ${{ env.STAGING_NAMESPACE }}
          echo ""
          echo "� Ingress:"
          kubectl get ingress -n ${{ env.STAGING_NAMESPACE }}
          echo ""
          echo "============================================="

      - name: Print Staging Deployment Summary
        run: |
          IMAGE_TAG="${{ steps.tag.outputs.image_tag }}"
          
          echo ""
          echo "============================================="
          echo "✅ STAGING DEPLOYMENT SUCCESSFUL"
          echo "============================================="
          echo ""
          echo "📦 Backend: ${{ env.DOCKER_USERNAME }}/productx-backend:${IMAGE_TAG}"
          echo "📦 Frontend: ${{ env.DOCKER_USERNAME }}/productx-frontend:${IMAGE_TAG}"
          echo "🌐 URL: https://staging.tranduchuy.site"
          echo "📝 Commit: ${{ github.sha }}"
          echo "👤 Deployed by: ${{ github.actor }}"
          echo ""
          echo "⏭️  Next: Manual approval required for Production deployment"
          echo "============================================="

  # ===========================================================================
  # JOB: PROMOTE TO PRODUCTION (Manual Approval Required)
  # ===========================================================================
  promote-to-production:
    name: Promote to Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: success()
    
    environment:
      name: production-approval
      url: https://www.tranduchuy.site

    steps:
      - name: Promotion Approved
        run: |
          echo "============================================="
          echo "✅ STAGING TESTS PASSED"
          echo "============================================="
          echo ""
          echo "Staging deployment has been tested and approved."
          echo "Ready to promote to production."
          echo ""
          echo "The production deployment workflow will be triggered automatically."
          echo "============================================="
      
      - name: Trigger Production Deployment
        uses: actions/github-script@v7
        with:
          script: |
            // Get the image tag from staging deployment
            const imageTag = '${{ needs.deploy-staging.outputs.image_tag || 'latest' }}';
            
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'deploy-cd.yml',
              ref: context.ref,
              inputs: {
                image_tag: imageTag,
                reason: 'Promoted from staging after successful tests'
              }
            });
            
            console.log('✅ Production deployment triggered with image tag:', imageTag);
