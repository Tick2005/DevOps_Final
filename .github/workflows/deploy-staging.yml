# =============================================================================
# DEPLOY-STAGING.YML - Staging Environment Deployment
# =============================================================================
# Trigger: Tự động chạy khi "Build & Release Docker" thành công
# Purpose: Deploy to staging environment for testing before production
# =============================================================================

name: Deploy to Staging

on:
  workflow_run:
    workflows: ["Build & Release Docker"]
    types:
      - completed
  
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Docker image tag to deploy (default: latest)'
        required: false
        default: 'latest'
      reason:
        description: 'Reason for manual deployment'
        required: false
        default: 'Manual trigger'

env:
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
  AWS_REGION: ap-southeast-1
  STAGING_NAMESPACE: productx-staging
  PROJECT_NAME: productx

jobs:
  # ===========================================================================
  # JOB: DEPLOY TO STAGING
  # ===========================================================================
  deploy-staging:
    name: Deploy to Staging Environment
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    
    environment:
      name: staging
      url: https://staging.tranduchuy.site

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.ref || github.event.workflow_run.head_sha }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure kubectl
        run: |
          echo "⚙️ Configuring kubectl for EKS..."
          aws eks update-kubeconfig --name ${{ secrets.EKS_CLUSTER_NAME }} --region ${{ env.AWS_REGION }}
          kubectl version --client
          kubectl cluster-info

      - name: Create Staging Namespace
        run: |
          echo "📦 Creating staging namespace..."
          kubectl create namespace ${{ env.STAGING_NAMESPACE }} --dry-run=client -o yaml | kubectl apply -f -
          echo "✅ Staging namespace ready"

      - name: Resolve DB Public IP
        id: db_ip
        run: |
          echo "🔎 Resolving DB public IP..."
          DB_PUBLIC_IP=$(aws ec2 describe-instances \
            --filters "Name=tag:Role,Values=database-nfs-server" "Name=tag:Project,Values=${{ env.PROJECT_NAME }}" "Name=instance-state-name,Values=running" \
            --query "Reservations[0].Instances[0].PublicIpAddress" \
            --output text)

          if [ -z "$DB_PUBLIC_IP" ] || [ "$DB_PUBLIC_IP" = "None" ]; then
            echo "❌ Could not resolve DB public IP via tags"
            exit 1
          fi

          echo "db_public_ip=${DB_PUBLIC_IP}" >> "$GITHUB_OUTPUT"
          echo "✅ DB public IP: ${DB_PUBLIC_IP}"

      - name: Setup SSH Key for Ansible
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ steps.db_ip.outputs.db_public_ip }} >> ~/.ssh/known_hosts

      - name: Generate Ansible Inventory
        working-directory: ansible/inventory
        run: |
          cat > hosts.ini << EOF
          # Auto-generated by GitHub Actions at $(date)

          [database]
          db-server ansible_host=${{ steps.db_ip.outputs.db_public_ip }} ansible_user=ubuntu ansible_python_interpreter=/usr/bin/python3

          [all:vars]
          ansible_ssh_private_key_file=~/.ssh/id_rsa
          ansible_ssh_common_args='-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null'
          EOF

          cat hosts.ini

      - name: Wait for SSH
        run: |
          echo "Waiting for SSH on DB server..."
          for i in {1..30}; do
            if ssh -o ConnectTimeout=5 -i ~/.ssh/id_rsa ubuntu@${{ steps.db_ip.outputs.db_public_ip }} "echo 'SSH Ready'"; then
              echo "✅ SSH ready!"
              break
            fi
            echo "⏳ Waiting for SSH... ($i/30)"
            sleep 10
          done

      - name: Install Ansible
        run: |
          sudo apt-get update
          sudo apt-get install -y ansible

      - name: Create Staging DB via Ansible
        working-directory: ansible
        run: |
          ansible-playbook -i inventory/hosts.ini playbooks/database.yml \
            -e "db_name=productx_staging db_user=productx_user db_password=${{ secrets.DB_PASSWORD }}" \
            -v

      - name: Apply Staging ConfigMap
        run: |
          echo "⚙️ Applying staging configuration..."
          
          # Get DB and NFS IPs from production configmap
          DB_HOST=$(kubectl get configmap app-config -n productx -o jsonpath='{.data.DB_HOST}')
          NFS_SERVER=$(kubectl get configmap app-config -n productx -o jsonpath='{.data.NFS_SERVER}')
          
          # Create staging configmap
          cat <<EOF | kubectl apply -f -
          apiVersion: v1
          kind: ConfigMap
          metadata:
            name: app-config
            namespace: ${{ env.STAGING_NAMESPACE }}
          data:
            DB_HOST: "$DB_HOST"
            DB_PORT: "5432"
            DB_NAME: "productx_staging"
            SPRING_DATASOURCE_URL: "jdbc:postgresql://${DB_HOST}:5432/productx_staging"
            SPRING_DATASOURCE_USERNAME: "productx_user"
            NFS_SERVER: "$NFS_SERVER"
            NFS_PATH: "/mnt/nfs_share/staging"
            APP_ENV: "staging"
          EOF
          
          echo "✅ Staging ConfigMap applied"

      - name: Apply Staging Secrets
        run: |
          echo "🔐 Applying staging secrets..."
          
          cat <<EOF | kubectl apply -f -
          apiVersion: v1
          kind: Secret
          metadata:
            name: app-secrets
            namespace: ${{ env.STAGING_NAMESPACE }}
          type: Opaque
          stringData:
            DB_PASSWORD: "${{ secrets.DB_PASSWORD }}"
            SPRING_DATASOURCE_PASSWORD: "${{ secrets.DB_PASSWORD }}"
          EOF
          
          echo "✅ Staging Secrets applied"

      - name: Update Deployment Images
        id: tag
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            IMAGE_TAG="${{ github.event.inputs.image_tag }}"
            echo "🔧 Manual deployment triggered"
            echo "📦 Using image tag: $IMAGE_TAG"
          else
            COMMIT_SHA="${{ github.event.workflow_run.head_sha }}"
            SHORT_SHA=$(echo "$COMMIT_SHA" | cut -c1-7)
            IMAGE_TAG="sha-${SHORT_SHA}"
            echo "🤖 Automatic deployment triggered"
            echo "📦 Using image tag: $IMAGE_TAG"
          fi
          
          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"

      - name: Update Deployment Images
        run: |
          IMAGE_TAG="${{ steps.tag.outputs.image_tag }}"
          if [ -z "$IMAGE_TAG" ]; then
            echo "❌ image_tag output is empty"
            exit 1
          fi
          
          # Update backend deployment
          cat kubernetes/base/backend/deployment.yaml | \
            sed "s|DOCKER_USERNAME|${{ env.DOCKER_USERNAME }}|g" | \
            sed "s|PLACEHOLDER_IMAGE_TAG|${IMAGE_TAG}|g" | \
            sed "s|namespace: productx|namespace: ${{ env.STAGING_NAMESPACE }}|g" | \
            sed "s|replicas: 2|replicas: 1|g" > /tmp/backend-deployment.yaml
          
          # Update frontend deployment
          cat kubernetes/base/frontend/deployment.yaml | \
            sed "s|DOCKER_USERNAME|${{ env.DOCKER_USERNAME }}|g" | \
            sed "s|PLACEHOLDER_IMAGE_TAG|${IMAGE_TAG}|g" | \
            sed "s|namespace: productx|namespace: ${{ env.STAGING_NAMESPACE }}|g" | \
            sed "s|replicas: 2|replicas: 1|g" > /tmp/frontend-deployment.yaml

          # Update backend service
          cat kubernetes/base/backend/service.yaml | \
            sed "s|namespace: productx|namespace: ${{ env.STAGING_NAMESPACE }}|g" > /tmp/backend-service.yaml

          # Update frontend service
          cat kubernetes/base/frontend/service.yaml | \
            sed "s|namespace: productx|namespace: ${{ env.STAGING_NAMESPACE }}|g" > /tmp/frontend-service.yaml
          
          echo "✅ Image tags updated to: ${IMAGE_TAG}"

      - name: Verify Staging Configuration
        run: |
          echo "🔍 Verifying staging configuration..."
          
          echo "📋 ConfigMap:"
          kubectl get configmap app-config -n ${{ env.STAGING_NAMESPACE }} -o yaml
          
          echo ""
          echo "📋 Secrets (names only):"
          kubectl get secret app-secrets -n ${{ env.STAGING_NAMESPACE }}
          
          echo ""
          echo "✅ Configuration verified"

      - name: Deploy to Staging
        run: |
          set -e
          
          echo "🚀 Deploying to Staging Environment..."
          
          # Deploy backend
          echo "📦 Deploying Backend..."
          kubectl apply -f /tmp/backend-service.yaml
          kubectl apply -f /tmp/backend-deployment.yaml
          
          # Deploy frontend
          echo "📦 Deploying Frontend..."
          kubectl apply -f /tmp/frontend-service.yaml
          kubectl apply -f /tmp/frontend-deployment.yaml
          
          # Wait for rollout
          echo "⏳ Waiting for rollout to complete..."
          kubectl rollout status deployment/backend -n ${{ env.STAGING_NAMESPACE }} --timeout=180s
          kubectl rollout status deployment/frontend -n ${{ env.STAGING_NAMESPACE }} --timeout=180s
          
          echo "✅ Staging deployment completed!"

      - name: Wait for Pods to be Ready
        run: |
          echo "⏳ Waiting for deployments to be ready..."
          kubectl rollout status deployment/backend -n ${{ env.STAGING_NAMESPACE }} --timeout=600s
          kubectl rollout status deployment/frontend -n ${{ env.STAGING_NAMESPACE }} --timeout=600s
          
          echo "✅ All staging pods are ready!"

      - name: Verify Staging Deployment
        run: |
          echo "🧪 Running Staging Tests..."
          
          # Port forward backend service for testing
          kubectl port-forward -n ${{ env.STAGING_NAMESPACE }} svc/backend-svc 8080:8080 &
          PF_PID=$!
          sleep 10
          
          # Test backend health
          echo "Test 1: Backend Health Check"
          HEALTH=$(curl -s http://localhost:8080/actuator/health || echo "FAILED")
          
          if echo "$HEALTH" | grep -q "UP"; then
            echo "✅ Backend is healthy"
          else
            echo "❌ Backend health check failed"
            kill $PF_PID 2>/dev/null || true
            exit 1
          fi
          
          # Test CRUD operations
          echo ""
          echo "Test 2: List Products"
          PRODUCTS=$(curl -s http://localhost:8080/api/products)
          
          if echo "$PRODUCTS" | grep -q "id"; then
            echo "✅ Can list products"
          else
            echo "❌ Cannot list products"
            kill $PF_PID 2>/dev/null || true
            exit 1
          fi
          
          # Test create product
          echo ""
          echo "Test 3: Create Product"
          NEW_PRODUCT=$(curl -s -X POST http://localhost:8080/api/products \
            -H "Content-Type: application/json" \
            -d '{
              "name": "Staging Test Product",
              "price": 99.99,
              "color": "Blue",
              "category": "Test",
              "stock": 10,
              "description": "Staging test",
              "image": "https://via.placeholder.com/150"
            }')
          
          if echo "$NEW_PRODUCT" | grep -q "Staging Test Product"; then
            echo "✅ Can create product"
            
            # Extract ID and cleanup
            PRODUCT_ID=$(echo "$NEW_PRODUCT" | grep -o '"id":[0-9]*' | grep -o '[0-9]*')
            curl -s -X DELETE "http://localhost:8080/api/products/$PRODUCT_ID"
            echo "✅ Cleanup completed"
          else
            echo "❌ Cannot create product"
            kill $PF_PID 2>/dev/null || true
            exit 1
          fi
          
          # Cleanup
          kill $PF_PID 2>/dev/null || true
          
          echo ""
          echo "🎉 All staging tests PASSED!"

      - name: Rollback Staging on Failure
        if: failure() && steps.staging_tests.outcome == 'failure'
        run: |
          echo "🔄 Rolling back staging deployment..."
          kubectl rollout undo deployment/backend -n ${{ env.STAGING_NAMESPACE }}
          kubectl rollout undo deployment/frontend -n ${{ env.STAGING_NAMESPACE }}
          echo "✅ Staging rollback completed"

      - name: Print Staging Summary
        run: |
          echo "============================================="
          echo "📊 STAGING DEPLOYMENT STATUS"
          echo "============================================="
          echo ""
          echo "� Pods:"
          kubectl get pods -n ${{ env.STAGING_NAMESPACE }} -o wide
          echo ""
          echo "🔹 Services:"
          kubectl get svc -n ${{ env.STAGING_NAMESPACE }}
          echo ""
          echo "� Ingress:"
          kubectl get ingress -n ${{ env.STAGING_NAMESPACE }}
          echo ""
          echo "============================================="

      - name: Print Staging Deployment Summary
        run: |
          IMAGE_TAG="${{ steps.tag.outputs.image_tag }}"
          
          echo ""
          echo "============================================="
          echo "✅ STAGING DEPLOYMENT SUCCESSFUL"
          echo "============================================="
          echo ""
          echo "📦 Backend: ${{ env.DOCKER_USERNAME }}/productx-backend:${IMAGE_TAG}"
          echo "📦 Frontend: ${{ env.DOCKER_USERNAME }}/productx-frontend:${IMAGE_TAG}"
          echo "🌐 URL: https://staging.tranduchuy.site"
          echo "📝 Commit: ${{ github.sha }}"
          echo "👤 Deployed by: ${{ github.actor }}"
          echo ""
          echo "⏭️  Next: Manual approval required for Production deployment"
          echo "============================================="

  # ===========================================================================
  # JOB: PROMOTE TO PRODUCTION (Manual Approval Required)
  # ===========================================================================
  promote-to-production:
    name: Promote to Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: success()
    
    environment:
      name: production-approval
      url: https://www.tranduchuy.site

    steps:
      - name: Promotion Approved
        run: |
          echo "============================================="
          echo "✅ STAGING TESTS PASSED"
          echo "============================================="
          echo ""
          echo "Staging deployment has been tested and approved."
          echo "Ready to promote to production."
          echo ""
          echo "The production deployment workflow will be triggered automatically."
          echo "============================================="
      
      - name: Trigger Production Deployment
        uses: actions/github-script@v7
        with:
          script: |
            // Get the image tag from staging deployment
            const imageTag = '${{ needs.deploy-staging.outputs.image_tag || 'latest' }}';
            
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'deploy-cd.yml',
              ref: context.ref,
              inputs: {
                image_tag: imageTag,
                reason: 'Promoted from staging after successful tests'
              }
            });
            
            console.log('✅ Production deployment triggered with image tag:', imageTag);
