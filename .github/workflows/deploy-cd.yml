# =============================================================================
# DEPLOY-CD.YML - Continuous Deployment for ProductX
# =============================================================================
# Trigger: Tự động chạy khi "Build & Release Docker" thành công
# =============================================================================

name: Continuous Deployment (CD)

on:
  workflow_run:
    workflows: ["Build & Release Docker"]
    types:
      - completed
  
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Docker image tag to deploy (default: latest)'
        required: false
        default: 'latest'
      reason:
        description: 'Reason for manual deployment'
        required: false
        default: 'Manual trigger'

env:
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
  AWS_REGION: ap-southeast-1

jobs:
  # ===========================================================================
  # JOB: DEPLOY APPLICATION TO EKS
  # ===========================================================================
  deploy:
    name: Deploy Application to EKS
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    
    environment:
      name: production
      url: https://productx.online

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.ref || github.event.workflow_run.head_sha }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure kubectl
        run: |
          echo "⚙️ Configuring kubectl for EKS..."
          aws eks update-kubeconfig --name ${{ secrets.EKS_CLUSTER_NAME }} --region ${{ env.AWS_REGION }}
          kubectl version --client
          kubectl cluster-info

      - name: Update Deployment Images
        run: |
          # Determine image tag based on trigger type
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            # Manual trigger: use input tag
            IMAGE_TAG="${{ github.event.inputs.image_tag }}"
            echo "🔧 Manual deployment triggered"
            echo "📦 Using image tag: $IMAGE_TAG"
            echo "📝 Reason: ${{ github.event.inputs.reason }}"
          else
            # Automatic trigger: use commit SHA
            COMMIT_SHA="${{ github.event.workflow_run.head_sha }}"
            SHORT_SHA=$(echo "$COMMIT_SHA" | cut -c1-7)
            IMAGE_TAG="sha-${SHORT_SHA}"
            echo "🤖 Automatic deployment triggered"
            echo "📦 Deploying commit: $COMMIT_SHA"
            echo "📦 Using image tag: $IMAGE_TAG"
          fi
          
          # Update backend deployment
          sed -i "s|DOCKER_USERNAME|${{ env.DOCKER_USERNAME }}|g" \
            kubernetes/base/backend/deployment.yaml
          sed -i "s|PLACEHOLDER_IMAGE_TAG|${IMAGE_TAG}|g" \
            kubernetes/base/backend/deployment.yaml
          
          # Update frontend deployment
          sed -i "s|DOCKER_USERNAME|${{ env.DOCKER_USERNAME }}|g" \
            kubernetes/base/frontend/deployment.yaml
          sed -i "s|PLACEHOLDER_IMAGE_TAG|${IMAGE_TAG}|g" \
            kubernetes/base/frontend/deployment.yaml
          
          echo "✅ Image tags updated to: ${IMAGE_TAG}"

      - name: Update Ingress Domain
        run: |
          echo "🌐 Updating Ingress with domain..."
          
          # Replace PLACEHOLDER_DOMAIN with actual domain
          sed -i "s|PLACEHOLDER_DOMAIN|www.${{ secrets.DOMAIN_NAME }}|g" kubernetes/ingress.yaml
          
          # Show the updated ingress for verification
          echo "📋 Updated Ingress configuration:"
          cat kubernetes/ingress.yaml | grep -A 5 "host:"

      - name: Clean Up Old ALB (if exists)
        run: |
          echo "🧹 Checking for existing ALB with wrong configuration..."
          
          # Check if ingress exists
          if kubectl get ingress app-ingress -n productx &>/dev/null; then
            echo "📋 Current ingress found"
            
            # Get current ALB hostname
            CURRENT_ALB=$(kubectl get ingress app-ingress -n productx -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null || echo "")
            
            if [ -n "$CURRENT_ALB" ]; then
              echo "🔍 Current ALB: $CURRENT_ALB"
              
              # Check if ALB has HTTPS listener (wrong config)
              echo "🔍 Checking ALB listeners..."
              ALB_ARN=$(aws elbv2 describe-load-balancers \
                --query "LoadBalancers[?DNSName=='$CURRENT_ALB'].LoadBalancerArn" \
                --output text 2>/dev/null || echo "")
              
              if [ -n "$ALB_ARN" ]; then
                HTTPS_LISTENER=$(aws elbv2 describe-listeners \
                  --load-balancer-arn "$ALB_ARN" \
                  --query "Listeners[?Port==\`443\`].ListenerArn" \
                  --output text 2>/dev/null || echo "")
                
                if [ -n "$HTTPS_LISTENER" ]; then
                  echo "⚠️ ALB has HTTPS listener (port 443) - needs recreation"
                  echo "🗑️ Deleting ingress to force ALB recreation..."
                  kubectl delete ingress app-ingress -n productx
                  
                  echo "⏳ Waiting for ALB to be deleted..."
                  sleep 30
                  
                  echo "✅ Old ALB will be cleaned up by AWS"
                else
                  echo "✅ ALB has correct configuration (HTTP only)"
                fi
              fi
            else
              echo "📋 No ALB found yet"
            fi
          else
            echo "📋 No existing ingress found"
          fi

      - name: Deploy Application
        run: |
          set -e
          
          echo "🚀 Deploying Application to EKS..."
          
          # Deploy backend
          echo "📦 Deploying Backend..."
          kubectl apply -f kubernetes/base/backend/deployment.yaml
          kubectl apply -f kubernetes/base/backend/service.yaml
          kubectl apply -f kubernetes/base/backend/hpa.yaml
          
          # Deploy frontend
          echo "📦 Deploying Frontend..."
          kubectl apply -f kubernetes/base/frontend/deployment.yaml
          kubectl apply -f kubernetes/base/frontend/service.yaml
          kubectl apply -f kubernetes/base/frontend/hpa.yaml
          
          # Update ingress
          echo "🌐 Applying Ingress..."
          kubectl apply -f kubernetes/ingress.yaml
          
          # Force rollout to pull new images
          echo "🔄 Rolling out new images..."
          kubectl rollout restart deployment/backend -n productx
          kubectl rollout restart deployment/frontend -n productx
          
          # Wait for rollout to complete with longer timeout
          echo "⏳ Waiting for rollout to complete..."
          kubectl rollout status deployment/backend -n productx --timeout=600s
          kubectl rollout status deployment/frontend -n productx --timeout=600s
          
          echo "✅ Application deployed successfully!"

      - name: Verify Deployment
        run: |
          echo ""
          echo "📊 Current Pod Status:"
          kubectl get pods -n productx -o wide
          echo ""
          echo "📊 Current Services:"
          kubectl get svc -n productx
          echo ""
          echo "📊 Current Ingress:"
          kubectl get ingress -n productx
          echo ""
          echo "📊 Ingress Details:"
          kubectl describe ingress app-ingress -n productx
          echo ""
          echo "📊 ALB Address:"
          kubectl get ingress app-ingress -n productx -o jsonpath='{.status.loadBalancer.ingress[0].hostname}'
          echo ""
          echo ""
          echo "📊 HPA Status:"
          kubectl get hpa -n productx

      - name: Wait for Pods to be Ready
        run: |
          echo "⏳ Waiting for all pods to be ready..."
          
          # Wait for backend pods
          kubectl wait --for=condition=ready pod \
            -l app=backend \
            -n productx \
            --timeout=300s
          
          # Wait for frontend pods
          kubectl wait --for=condition=ready pod \
            -l app=frontend \
            -n productx \
            --timeout=300s
          
          echo "✅ All pods are ready!"
          
          # Additional wait for application startup
          echo "⏳ Waiting additional 30 seconds for application initialization..."
          sleep 30
          
          # Check pod logs for startup confirmation
          echo "📋 Checking backend pod logs..."
          kubectl logs -l app=backend -n productx --tail=20 || true

      - name: Health Check - Backend API
        id: health_backend
        run: |
          echo "🏥 Checking Backend API health..."
          
          # Get ALB hostname
          echo "🔍 Getting ALB hostname..."
          ALB_HOSTNAME=$(kubectl get ingress app-ingress -n productx -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')
          
          if [ -z "$ALB_HOSTNAME" ]; then
            echo "❌ ALB hostname not found! Ingress may not be ready."
            kubectl describe ingress app-ingress -n productx
            exit 1
          fi
          
          echo "✅ ALB Hostname: $ALB_HOSTNAME"
          
          # Always use ALB hostname for health check (more reliable than domain)
          # Domain might not have DNS configured yet
          echo "🌐 Testing via ALB hostname (more reliable)"
          BACKEND_URL="http://$ALB_HOSTNAME/api/actuator/health"
          
          # Check if domain is configured (informational only)
          DOMAIN="${{ secrets.DOMAIN_NAME }}"
          if [ -n "$DOMAIN" ]; then
            echo "📋 Domain configured: www.$DOMAIN"
            echo "🔍 Checking DNS resolution..."
            if nslookup "www.$DOMAIN" &>/dev/null; then
              echo "✅ DNS resolved"
            else
              echo "⚠️ DNS not resolved yet (this is OK, using ALB directly)"
            fi
          fi
          
          # Also test direct pod access
          echo ""
          echo "🔍 Testing direct pod access first..."
          POD_NAME=$(kubectl get pods -n productx -l app=backend -o jsonpath='{.items[0].metadata.name}')
          if [ -n "$POD_NAME" ]; then
            echo "Testing pod: $POD_NAME"
            # Use wget instead of curl since curl might not be in the image
            kubectl exec -n productx $POD_NAME -- wget -q -O- http://localhost:8080/actuator/health || echo "⚠️ Pod health check failed (wget not available, trying alternative)"
          fi
          
          # Test service endpoint
          echo ""
          echo "🔍 Testing service endpoint..."
          kubectl run curl-test --image=curlimages/curl:latest --rm -i --restart=Never -n productx -- \
            curl -s http://backend-svc:8080/actuator/health || echo "⚠️ Service health check failed"
          
          # Retry logic for ALB health check
          echo ""
          echo "🔍 Testing ALB access via $BACKEND_URL"
          MAX_RETRIES=10
          RETRY_COUNT=0
          RETRY_DELAY=15
          
          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            echo "Attempt $((RETRY_COUNT + 1))/$MAX_RETRIES: Checking $BACKEND_URL"
            
            # Use -L to follow redirects, --max-time for timeout
            HTTP_CODE=$(curl -L -s -o /dev/null -w "%{http_code}" --max-time 10 "$BACKEND_URL" 2>/dev/null || echo "000")
            
            # Clean up HTTP code (remove any extra characters)
            HTTP_CODE=$(echo "$HTTP_CODE" | tr -d '[:space:]' | grep -o '^[0-9]\{3\}')
            
            if [ "$HTTP_CODE" = "200" ]; then
              echo "✅ Backend API is healthy (HTTP $HTTP_CODE)"
              
              # Get detailed health info
              HEALTH_RESPONSE=$(curl -L -s "$BACKEND_URL" 2>/dev/null || echo "")
              echo "Health Response: $HEALTH_RESPONSE"
              exit 0
            elif [ "$HTTP_CODE" = "301" ] || [ "$HTTP_CODE" = "302" ]; then
              echo "⚠️ Backend API returned redirect (HTTP $HTTP_CODE)"
              echo "This is expected if ALB is configured for HTTPS redirect"
              
              # Try HTTPS
              HTTPS_URL="${BACKEND_URL/http:/https:}"
              echo "Trying HTTPS: $HTTPS_URL"
              HTTPS_CODE=$(curl -k -L -s -o /dev/null -w "%{http_code}" --max-time 10 "$HTTPS_URL" 2>/dev/null || echo "000")
              
              if [ "$HTTPS_CODE" = "200" ]; then
                echo "✅ Backend API is healthy via HTTPS (HTTP $HTTPS_CODE)"
                HEALTH_RESPONSE=$(curl -k -L -s "$HTTPS_URL" 2>/dev/null || echo "")
                echo "Health Response: $HEALTH_RESPONSE"
                exit 0
              fi
            else
              echo "⚠️ Backend API returned HTTP $HTTP_CODE"
              
              # Check if it's a connection issue
              if [ "$HTTP_CODE" = "000" ]; then
                echo "🔍 Connection failed - running diagnostics..."
                echo ""
                echo "Pod Status:"
                kubectl get pods -l app=backend -n productx
                echo ""
                echo "Service Endpoints:"
                kubectl get endpoints backend-svc -n productx
                echo ""
                echo "Ingress Status:"
                kubectl get ingress app-ingress -n productx
              fi
              
              RETRY_COUNT=$((RETRY_COUNT + 1))
              
              if [ $RETRY_COUNT -lt $MAX_RETRIES ]; then
                echo "Waiting $RETRY_DELAY seconds before retry..."
                sleep $RETRY_DELAY
              fi
            fi
          done
          
          echo ""
          echo "❌ Backend API health check failed after $MAX_RETRIES attempts"
          echo ""
          echo "📋 Final Diagnostics:"
          echo "===================="
          echo ""
          echo "Pod Status:"
          kubectl get pods -l app=backend -n productx -o wide
          echo ""
          echo "Recent Backend Logs:"
          kubectl logs -l app=backend -n productx --tail=50 || true
          echo ""
          echo "Service Details:"
          kubectl describe svc backend-svc -n productx
          echo ""
          echo "Ingress Details:"
          kubectl describe ingress app-ingress -n productx
          echo ""
          exit 1

      - name: Health Check - Frontend
        id: health_frontend
        run: |
          echo "🏥 Checking Frontend health..."
          
          # Get ALB hostname
          ALB_HOSTNAME=$(kubectl get ingress app-ingress -n productx -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')
          
          # Use ALB hostname instead of domain
          FRONTEND_URL="http://$ALB_HOSTNAME/"
          
          echo "Testing: $FRONTEND_URL"
          
          # Check if frontend is accessible
          HTTP_CODE=$(curl -L -s -o /dev/null -w "%{http_code}" --max-time 10 "$FRONTEND_URL" 2>/dev/null || echo "000")
          
          if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "301" ] || [ "$HTTP_CODE" = "302" ]; then
            echo "✅ Frontend is healthy (HTTP $HTTP_CODE)"
          else
            echo "❌ Frontend health check failed (HTTP $HTTP_CODE)"
            exit 1
          fi

      - name: Smoke Tests - CRUD Operations
        id: smoke_tests
        run: |
          echo "🧪 Running Smoke Tests..."
          
          # Get ALB hostname
          ALB_HOSTNAME=$(kubectl get ingress app-ingress -n productx -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')
          
          # Use ALB hostname for smoke tests
          API_BASE="http://$ALB_HOSTNAME/api"
          
          echo "Testing API at: $API_BASE"
          
          # Test 1: List all products (GET /api/products)
          echo "Test 1: GET /api/products"
          PRODUCTS=$(curl -s "$API_BASE/products")
          echo "Response: $PRODUCTS"
          
          if echo "$PRODUCTS" | grep -q "id"; then
            echo "✅ Test 1 PASSED: Can list products"
          else
            echo "❌ Test 1 FAILED: Cannot list products"
            exit 1
          fi
          
          # Test 2: Get single product (GET /api/products/1)
          echo ""
          echo "Test 2: GET /api/products/1"
          PRODUCT=$(curl -s "$API_BASE/products/1")
          echo "Response: $PRODUCT"
          
          if echo "$PRODUCT" | grep -q "id"; then
            echo "✅ Test 2 PASSED: Can get single product"
          else
            echo "❌ Test 2 FAILED: Cannot get single product"
            exit 1
          fi
          
          # Test 3: Create new product (POST /api/products)
          echo ""
          echo "Test 3: POST /api/products"
          NEW_PRODUCT=$(curl -s -X POST "$API_BASE/products" \
            -H "Content-Type: application/json" \
            -d '{
              "name": "Smoke Test Product",
              "price": 99.99,
              "color": "Blue",
              "category": "Test",
              "stock": 10,
              "description": "Created by smoke test",
              "image": "https://via.placeholder.com/150"
            }')
          
          echo "Response: $NEW_PRODUCT"
          
          if echo "$NEW_PRODUCT" | grep -q "Smoke Test Product"; then
            echo "✅ Test 3 PASSED: Can create product"
            
            # Extract product ID for cleanup
            PRODUCT_ID=$(echo "$NEW_PRODUCT" | jq -r '.id')
            echo "Created product ID: $PRODUCT_ID"
            
            if [ -z "$PRODUCT_ID" ] || [ "$PRODUCT_ID" = "null" ]; then
              echo "❌ Failed to extract product ID"
              exit 1
            fi
            
            # Test 4: Update product (PUT /api/products/{id})
            echo ""
            echo "Test 4: PUT /api/products/$PRODUCT_ID"
            UPDATED_PRODUCT=$(curl -s -X PUT "$API_BASE/products/$PRODUCT_ID" \
              -H "Content-Type: application/json" \
              -d '{
                "name": "Updated Smoke Test Product",
                "price": 149.99,
                "color": "Red",
                "category": "Test",
                "stock": 20,
                "description": "Updated by smoke test",
                "image": "https://via.placeholder.com/150"
              }')
            
            echo "Response: $UPDATED_PRODUCT"
            
            if echo "$UPDATED_PRODUCT" | grep -q "Updated Smoke Test Product"; then
              echo "✅ Test 4 PASSED: Can update product"
            else
              echo "❌ Test 4 FAILED: Cannot update product"
              exit 1
            fi
            
            # Test 5: Delete product (DELETE /api/products/{id})
            echo ""
            echo "Test 5: DELETE /api/products/$PRODUCT_ID"
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" -X DELETE "$API_BASE/products/$PRODUCT_ID")
            
            if [ "$HTTP_CODE" = "204" ]; then
              echo "✅ Test 5 PASSED: Can delete product (HTTP $HTTP_CODE)"
            else
              echo "❌ Test 5 FAILED: Cannot delete product (HTTP $HTTP_CODE)"
              exit 1
            fi
          else
            echo "❌ Test 3 FAILED: Cannot create product"
            exit 1
          fi
          
          echo ""
          echo "🎉 All smoke tests PASSED!"

      - name: Rollback on Failure
        if: failure() && (steps.health_backend.outcome == 'failure' || steps.health_frontend.outcome == 'failure' || steps.smoke_tests.outcome == 'failure')
        run: |
          echo "============================================="
          echo "🔄 DEPLOYMENT FAILED - INITIATING ROLLBACK"
          echo "============================================="
          
          # Rollback backend
          echo "Rolling back backend deployment..."
          kubectl rollout undo deployment/backend -n productx
          kubectl rollout status deployment/backend -n productx --timeout=180s
          
          # Rollback frontend
          echo "Rolling back frontend deployment..."
          kubectl rollout undo deployment/frontend -n productx
          kubectl rollout status deployment/frontend -n productx --timeout=180s
          
          echo ""
          echo "✅ Rollback completed!"
          echo "📊 Current deployment status:"
          kubectl get pods -n productx
          
          echo ""
          echo "============================================="
          echo "❌ DEPLOYMENT FAILED AND ROLLED BACK"
          echo "============================================="
          exit 1

      - name: Print Deployment Summary
        run: |
          # Determine image tag based on trigger type
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            IMAGE_TAG="${{ github.event.inputs.image_tag }}"
            TRIGGER_TYPE="Manual"
            TRIGGER_INFO="Reason: ${{ github.event.inputs.reason }}"
          else
            COMMIT_SHA="${{ github.event.workflow_run.head_sha }}"
            SHORT_SHA=$(echo "$COMMIT_SHA" | cut -c1-7)
            IMAGE_TAG="sha-${SHORT_SHA}"
            TRIGGER_TYPE="Automatic"
            TRIGGER_INFO="Commit: $COMMIT_SHA"
          fi
          
          echo "============================================="
          echo "🎉 DEPLOYMENT COMPLETED!"
          echo "============================================="
          echo "Trigger: $TRIGGER_TYPE"
          echo "$TRIGGER_INFO"
          echo "Backend Image: ${{ env.DOCKER_USERNAME }}/productx-backend:${IMAGE_TAG}"
          echo "Frontend Image: ${{ env.DOCKER_USERNAME }}/productx-frontend:${IMAGE_TAG}"
          echo "EKS Cluster: ${{ secrets.EKS_CLUSTER_NAME }}"
          echo "Region: ${{ env.AWS_REGION }}"
          echo "Namespace: productx"
          echo "============================================="

  # ===========================================================================
  # JOB: NOTIFY ON CI FAILURE
  # ===========================================================================
  notify-ci-failed:
    name: Notify CI Failed
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    
    steps:
      - name: CI Failed Notification
        run: |
          echo "============================================="
          echo "❌ CI PIPELINE FAILED!"
          echo "============================================="
          echo "CD Pipeline skipped because CI failed."
          echo "Please check the 'Build & Release Docker' workflow."
          echo "Commit: ${{ github.event.workflow_run.head_sha }}"
          echo "============================================="
