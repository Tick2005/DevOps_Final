# =============================================================================
# INFRASTRUCTURE CI/CD - Terraform + Ansible for ProductX
# =============================================================================
# Trigger: Push to main (terraform/** or ansible/**) or manual dispatch
# =============================================================================

name: Infrastructure Provisioning & Configuration

on:
  push:
    branches: ["main"]
    paths:
      - "terraform/**"
      - "ansible/**"
      - "kubernetes/**"
      - ".github/workflows/infrastructure-cd.yml"
  
  workflow_dispatch:
    inputs:
      action:
        description: "Action to perform"
        required: true
        default: "apply"
        type: choice
        options:
          - apply
          - destroy
      
      confirm_destroy:
        description: 'Type "DESTROY" to confirm infrastructure deletion'
        required: false
        default: ""

env:
  AWS_REGION: ap-southeast-1
  TF_VERSION: "1.7"

jobs:
  # ===========================================================================
  # JOB 1: SECURITY SCANNING
  # ===========================================================================
  security-scan:
    name: Security Scanning
    runs-on: ubuntu-latest
    if: github.event.inputs.action != 'destroy'
    
    permissions:
      contents: read
      security-events: write
      actions: read
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Run Trivy vulnerability scanner in IaC mode
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'config'
          scan-ref: 'terraform'
          format: 'sarif'
          output: 'trivy-results.sarif'
          exit-code: '0'
      
      - name: Upload Trivy Results
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif
          category: trivy-iac
      
      - name: Run TruffleHog
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          extra_args: --only-verified

  # ===========================================================================
  # JOB 2: TERRAFORM PLAN
  # ===========================================================================
  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: security-scan
    if: github.event.inputs.action != 'destroy'
    
    outputs:
      plan_exitcode: ${{ steps.plan.outputs.exitcode }}
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      
      - name: Configure Backend with Secret
        working-directory: terraform
        run: |
          if [ -n "${{ secrets.TF_BACKEND_BUCKET }}" ]; then
            echo "✅ Using backend bucket from secret: ${{ secrets.TF_BACKEND_BUCKET }}"
            sed -i 's/productx-tfstate-REPLACE_ME/${{ secrets.TF_BACKEND_BUCKET }}/g' backend.tf
          else
            echo "⚠️ TF_BACKEND_BUCKET secret not set!"
            echo "Run ./bootstrap-backend.sh to create backend and get bucket name"
            exit 1
          fi
      
      - name: Terraform Init
        working-directory: terraform
        run: terraform init
      
      - name: Cleanup Legacy Helm State
        working-directory: terraform
        run: |
          echo "🧹 Checking for legacy Helm resources in state..."
          
          # Remove helm_release if exists (from previous deployments)
          if terraform state list 2>/dev/null | grep -q "helm_release"; then
            echo "  Found helm_release in state, removing..."
            terraform state rm helm_release.aws_load_balancer_controller 2>/dev/null || true
            echo "  ✅ Removed from state"
          else
            echo "  ✅ No helm_release in state"
          fi
          
          echo "✅ State cleanup completed"
      
      - name: Terraform Validate
        working-directory: terraform
        run: terraform validate
      
      - name: Terraform Plan
        id: plan
        working-directory: terraform
        timeout-minutes: 20
        run: |
          if [ -n "${{ secrets.DOMAIN_NAME }}" ]; then
            ENABLE_HTTPS="true"
          else
            ENABLE_HTTPS="false"
          fi
          
          set +e  # Don't exit on error
          terraform plan \
            -out=tfplan \
            -no-color \
            -detailed-exitcode \
            -var="key_name=${{ secrets.AWS_KEY_NAME }}" \
            -var="domain_name=${{ secrets.DOMAIN_NAME }}" \
            -var="enable_https=${ENABLE_HTTPS}"
          
          exitcode=$?
          set -e  # Re-enable exit on error
          
          echo "exitcode=$exitcode" >> $GITHUB_OUTPUT
          
          # Exit codes:
          # 0 = No changes
          # 1 = Error
          # 2 = Success with changes
          if [ $exitcode -eq 1 ]; then
            echo "❌ Terraform plan failed"
            exit 1
          elif [ $exitcode -eq 2 ]; then
            echo "✅ Terraform plan succeeded with changes"
            exit 0
          else
            echo "✅ Terraform plan succeeded with no changes"
            exit 0
          fi
      
      - name: Upload Terraform Plan
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: terraform/tfplan
          retention-days: 5

  # ===========================================================================
  # JOB 3: TERRAFORM APPLY
  # ===========================================================================
  terraform-apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: terraform-plan
    if: github.event.inputs.action != 'destroy'
    
    environment:
      name: production-infrastructure
      url: https://www.tranduchuy.site
    
    outputs:
      db_public_ip: ${{ steps.outputs.outputs.db_public_ip }}
      db_private_ip: ${{ steps.outputs.outputs.db_private_ip }}
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false
      
      - name: Configure Backend with Secret
        working-directory: terraform
        run: |
          sed -i 's/productx-tfstate-REPLACE_ME/${{ secrets.TF_BACKEND_BUCKET }}/g' backend.tf
      
      - name: Terraform Init
        working-directory: terraform
        run: terraform init
      
      - name: Cleanup Legacy Helm State
        working-directory: terraform
        run: |
          echo "🧹 Checking for legacy Helm resources in state..."
          if terraform state list 2>/dev/null | grep -q "helm_release"; then
            echo "  Removing helm_release from state..."
            terraform state rm helm_release.aws_load_balancer_controller 2>/dev/null || true
            echo "  ✅ Removed"
          fi
      
      - name: Download Terraform Plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: terraform/
      
      - name: Terraform Apply
        working-directory: terraform
        timeout-minutes: 45
        run: terraform apply -auto-approve tfplan
      
      - name: Export Terraform Outputs
        id: outputs
        working-directory: terraform
        run: |
          echo "db_public_ip=$(terraform output -raw db_public_ip)" >> $GITHUB_OUTPUT
          echo "db_private_ip=$(terraform output -raw db_private_ip)" >> $GITHUB_OUTPUT
          terraform output -json > outputs.json
      
      - name: Upload Terraform Outputs
        uses: actions/upload-artifact@v4
        with:
          name: terraform-outputs
          path: terraform/outputs.json
          retention-days: 5

  # ===========================================================================
  # JOB 4: ANSIBLE CONFIGURATION
  # ===========================================================================
  ansible-config:
    name: Ansible Configuration
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: terraform-apply
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ needs.terraform-apply.outputs.db_public_ip }} >> ~/.ssh/known_hosts
      
      - name: Generate Ansible Inventory
        working-directory: ansible/inventory
        run: |
          cat > hosts.ini << EOF
          # Auto-generated by GitHub Actions at $(date)
          
          [database]
          db-server ansible_host=${{ needs.terraform-apply.outputs.db_public_ip }} ansible_user=ubuntu ansible_python_interpreter=/usr/bin/python3
          
          [nfs_server]
          db-server ansible_host=${{ needs.terraform-apply.outputs.db_public_ip }} ansible_user=ubuntu ansible_python_interpreter=/usr/bin/python3
          
          [all:vars]
          ansible_ssh_private_key_file=~/.ssh/id_rsa
          ansible_ssh_common_args='-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null'
          EOF
          
          cat hosts.ini
      
      - name: Wait for SSH
        run: |
          echo "Waiting for SSH on DB/NFS server..."
          for i in {1..30}; do
            if ssh -o ConnectTimeout=5 -i ~/.ssh/id_rsa ubuntu@${{ needs.terraform-apply.outputs.db_public_ip }} "echo 'SSH Ready'"; then
              echo "✅ SSH ready!"
              break
            fi
            echo "⏳ Waiting for SSH... ($i/30)"
            sleep 10
          done
      
      - name: Install Ansible
        run: |
          sudo apt-get update
          sudo apt-get install -y ansible
      
      - name: Test Ansible Connectivity
        working-directory: ansible
        run: ansible all -i inventory/hosts.ini -m ping
      
      - name: Run Ansible Playbook
        working-directory: ansible
        run: |
          ansible-playbook -i inventory/hosts.ini playbooks/site.yml \
            -e "db_password=${{ secrets.DB_PASSWORD }}" \
            -v

  # ===========================================================================
  # JOB 5: KUBERNETES BASE SETUP
  # ===========================================================================
  kubernetes-setup:
    name: Kubernetes Base Setup
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [terraform-apply, ansible-config]
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      
      - name: Download Terraform Outputs
        uses: actions/download-artifact@v4
        with:
          name: terraform-outputs
          path: ./
      
      - name: Configure kubectl
        run: |
          aws eks update-kubeconfig \
            --name ${{ secrets.EKS_CLUSTER_NAME }} \
            --region ${{ env.AWS_REGION }}
          kubectl version --client
          kubectl cluster-info
      
      - name: Setup Terraform for Helm
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      
      - name: Check and Cleanup Existing Helm Release
        run: |
          echo "🔍 Checking for existing AWS Load Balancer Controller Helm release..."
          
          # Check if helm release exists
          if helm list -n kube-system | grep -q "aws-load-balancer-controller"; then
            echo "⚠️ Found existing Helm release, cleaning up..."
            
            # Uninstall existing release
            helm uninstall aws-load-balancer-controller -n kube-system || true
            
            echo "⏳ Waiting for cleanup to complete..."
            sleep 15
            
            # Verify cleanup
            if helm list -n kube-system | grep -q "aws-load-balancer-controller"; then
              echo "❌ Failed to cleanup existing release"
              exit 1
            else
              echo "✅ Existing release cleaned up successfully"
            fi
          else
            echo "✅ No existing Helm release found"
          fi
      
      - name: Install AWS Load Balancer Controller via Terraform Helm
        working-directory: terraform-helm
        run: |
          echo "📦 Installing AWS Load Balancer Controller via Terraform Helm Provider..."
          
          # Get values from Terraform outputs
          CLUSTER_NAME="${{ secrets.EKS_CLUSTER_NAME }}"
          VPC_ID=$(jq -r '.vpc_id.value' ../outputs.json)
          ROLE_ARN=$(jq -r '.aws_load_balancer_controller_role_arn.value' ../outputs.json)
          
          echo "Cluster: $CLUSTER_NAME"
          echo "VPC ID: $VPC_ID"
          echo "Role ARN: $ROLE_ARN"
          
          # Initialize Terraform (cluster is ready now!)
          terraform init
          
          # Apply Helm chart
          terraform apply -auto-approve \
            -var="cluster_name=$CLUSTER_NAME" \
            -var="vpc_id=$VPC_ID" \
            -var="lb_controller_role_arn=$ROLE_ARN" \
            -var="aws_region=${{ env.AWS_REGION }}"
          
          echo "✅ AWS Load Balancer Controller installed via Terraform Helm"
      
      - name: Verify AWS Load Balancer Controller
        run: |
          echo "🔍 Verifying AWS Load Balancer Controller installation..."
          
          # Check deployment
          kubectl get deployment -n kube-system aws-load-balancer-controller
          
          # Check pods
          kubectl get pods -n kube-system -l app.kubernetes.io/name=aws-load-balancer-controller
          
          # Wait for pods to be ready
          kubectl wait --for=condition=ready pod \
            -l app.kubernetes.io/name=aws-load-balancer-controller \
            -n kube-system \
            --timeout=300s
          
          echo "✅ AWS Load Balancer Controller is ready"
      
      - name: Install Monitoring Stack via Terraform
        working-directory: monitoring-stack
        env:
          KUBE_CONFIG_PATH: ~/.kube/config
        run: |
          echo "📊 Installing Monitoring Stack (Prometheus + Grafana + Alertmanager)..."
          
          # Initialize Terraform
          terraform init
          
          # Import existing resources if they exist (idempotent)
          echo "🔍 Checking for existing resources..."
          
          # Check and import metrics-server if exists
          if helm list -n kube-system | grep -q "metrics-server"; then
            echo "⚠️ metrics-server already exists, importing..."
            terraform import helm_release.metrics_server kube-system/metrics-server || true
          fi
          
          # Check and import storage class if exists
          if kubectl get storageclass gp3 &>/dev/null; then
            echo "⚠️ StorageClass gp3 already exists, importing..."
            terraform import kubernetes_storage_class_v1.gp3 gp3 || true
          fi
          
          # Check and import kube-prometheus-stack if exists
          if helm list -n monitoring | grep -q "kube-prometheus-stack"; then
            echo "⚠️ kube-prometheus-stack already exists, importing..."
            terraform import helm_release.kube_prometheus_stack monitoring/kube-prometheus-stack || true
          fi
          
          echo "✅ Import check completed"
          
          # Apply monitoring stack
          # Providers will use KUBECONFIG from environment
          terraform apply -auto-approve \
            -var="grafana_admin_password=${{ secrets.GRAFANA_ADMIN_PASSWORD }}" \
            -var="alert_email=${{ secrets.ALERT_EMAIL }}" \
            -var="alert_email_password=${{ secrets.ALERT_EMAIL_PASSWORD }}"
          
          echo "✅ Monitoring Stack installed"
      
      - name: Verify Monitoring Stack
        run: |
          echo "🔍 Verifying Monitoring Stack installation..."
          
          # Wait for monitoring namespace
          kubectl wait --for=jsonpath='{.status.phase}'=Active namespace/monitoring --timeout=60s || true
          
          # Check pods (may take time to start)
          echo "📊 Monitoring Pods:"
          kubectl get pods -n monitoring || echo "Pods still starting..."
          
          # Check PVCs
          echo "📊 Persistent Volume Claims:"
          kubectl get pvc -n monitoring || echo "PVCs still creating..."
          
          echo "✅ Monitoring Stack deployment initiated"
          echo "⏳ Note: Prometheus and Grafana may take 5-10 minutes to fully start"
      
      - name: Wait for Monitoring Pods to be Ready
        run: |
          echo "⏳ Waiting for monitoring pods to be ready..."
          
          # Wait for Prometheus Operator
          kubectl wait --for=condition=ready pod \
            -l app.kubernetes.io/name=kube-prometheus-stack-operator \
            -n monitoring \
            --timeout=300s || echo "⚠️ Operator not ready yet"
          
          # Wait for Grafana
          kubectl wait --for=condition=ready pod \
            -l app.kubernetes.io/name=grafana \
            -n monitoring \
            --timeout=300s || echo "⚠️ Grafana not ready yet"
          
          # Wait for Alertmanager
          kubectl wait --for=condition=ready pod \
            -l app.kubernetes.io/name=alertmanager \
            -n monitoring \
            --timeout=300s || echo "⚠️ Alertmanager not ready yet"
          
          # Note: Prometheus may take longer due to resource requirements
          echo "⏳ Waiting for Prometheus (may take longer)..."
          kubectl wait --for=condition=ready pod \
            -l app.kubernetes.io/name=prometheus \
            -n monitoring \
            --timeout=600s || echo "⚠️ Prometheus not ready yet (check node resources)"
          
          echo "✅ Monitoring pods check completed!"
      
      - name: Test Prometheus Health
        id: test_prometheus
        continue-on-error: true
        run: |
          echo "🧪 Testing Prometheus health..."
          
          # Port forward Prometheus
          kubectl port-forward -n monitoring svc/kube-prometheus-stack-prometheus 9090:9090 &
          PF_PID=$!
          sleep 10
          
          # Check Prometheus health
          PROM_HEALTH=$(curl -s http://localhost:9090/-/healthy || echo "FAILED")
          
          if [ "$PROM_HEALTH" = "Prometheus Server is Healthy." ] || [ "$PROM_HEALTH" = "Prometheus is Healthy." ]; then
            echo "✅ Prometheus is healthy"
            
            # Check Prometheus targets
            echo "📊 Checking Prometheus targets..."
            TARGETS=$(curl -s http://localhost:9090/api/v1/targets | jq -r '.data.activeTargets | length')
            echo "Active targets: $TARGETS"
            
            if [ "$TARGETS" -gt 0 ]; then
              echo "✅ Prometheus has $TARGETS active targets"
            else
              echo "⚠️ Prometheus has no active targets yet"
            fi
          else
            echo "⚠️ Prometheus health check returned: $PROM_HEALTH"
          fi
          
          # Cleanup
          kill $PF_PID 2>/dev/null || true
      
      - name: Test Grafana Health
        id: test_grafana
        continue-on-error: true
        run: |
          echo "🧪 Testing Grafana health..."
          
          # Port forward Grafana
          kubectl port-forward -n monitoring svc/kube-prometheus-stack-grafana 3000:80 &
          PF_PID=$!
          sleep 10
          
          # Check Grafana health
          GRAFANA_HEALTH=$(curl -s http://localhost:3000/api/health || echo "FAILED")
          
          if echo "$GRAFANA_HEALTH" | grep -q "ok"; then
            echo "✅ Grafana is healthy"
            
            # Check Grafana version
            GRAFANA_VERSION=$(echo "$GRAFANA_HEALTH" | jq -r '.version' 2>/dev/null || echo "unknown")
            echo "Grafana version: $GRAFANA_VERSION"
          else
            echo "⚠️ Grafana health check failed: $GRAFANA_HEALTH"
          fi
          
          # Cleanup
          kill $PF_PID 2>/dev/null || true
      
      - name: Test Alertmanager Health
        id: test_alertmanager
        continue-on-error: true
        run: |
          echo "🧪 Testing Alertmanager health..."
          
          # Port forward Alertmanager
          kubectl port-forward -n monitoring svc/kube-prometheus-stack-alertmanager 9093:9093 &
          PF_PID=$!
          sleep 10
          
          # Check Alertmanager health
          AM_HEALTH=$(curl -s http://localhost:9093/-/healthy || echo "FAILED")
          
          if [ "$AM_HEALTH" = "OK" ]; then
            echo "✅ Alertmanager is healthy"
            
            # Check Alertmanager status
            AM_STATUS=$(curl -s http://localhost:9093/api/v2/status)
            echo "Alertmanager status: $AM_STATUS"
          else
            echo "⚠️ Alertmanager health check failed: $AM_HEALTH"
          fi
          
          # Cleanup
          kill $PF_PID 2>/dev/null || true
      
      - name: Verify Metrics Collection
        continue-on-error: true
        run: |
          echo "📊 Verifying metrics collection..."
          
          # Port forward Prometheus
          kubectl port-forward -n monitoring svc/kube-prometheus-stack-prometheus 9090:9090 &
          PF_PID=$!
          sleep 10
          
          # Query some basic metrics
          echo "Checking node metrics..."
          NODE_METRICS=$(curl -s 'http://localhost:9090/api/v1/query?query=up{job="node-exporter"}' | jq -r '.data.result | length')
          echo "Node exporter metrics: $NODE_METRICS targets"
          
          echo "Checking Kubernetes metrics..."
          K8S_METRICS=$(curl -s 'http://localhost:9090/api/v1/query?query=up{job="kube-state-metrics"}' | jq -r '.data.result | length')
          echo "Kube-state-metrics: $K8S_METRICS targets"
          
          echo "Checking pod metrics..."
          POD_METRICS=$(curl -s 'http://localhost:9090/api/v1/query?query=kube_pod_info' | jq -r '.data.result | length')
          echo "Pod metrics: $POD_METRICS pods"
          
          if [ "$POD_METRICS" -gt 0 ]; then
            echo "✅ Metrics are being collected successfully"
          else
            echo "⚠️ No pod metrics found yet (may need more time)"
          fi
          
          # Cleanup
          kill $PF_PID 2>/dev/null || true
      
      - name: Print Monitoring Stack Summary
        run: |
          echo "============================================="
          echo "📊 MONITORING STACK SUMMARY"
          echo "============================================="
          echo ""
          echo "Components Status:"
          
          if [ "${{ steps.test_prometheus.outcome }}" = "success" ]; then
            echo "  ✅ Prometheus: Healthy"
          else
            echo "  ⚠️ Prometheus: Check manually"
          fi
          
          if [ "${{ steps.test_grafana.outcome }}" = "success" ]; then
            echo "  ✅ Grafana: Healthy"
          else
            echo "  ⚠️ Grafana: Check manually"
          fi
          
          if [ "${{ steps.test_alertmanager.outcome }}" = "success" ]; then
            echo "  ✅ Alertmanager: Healthy"
          else
            echo "  ⚠️ Alertmanager: Check manually"
          fi
          
          echo ""
          echo "Access URLs:"
          if [ -n "${{ secrets.DOMAIN_NAME }}" ]; then
            echo "  Grafana:      https://monitoring.${{ secrets.DOMAIN_NAME }}"
            echo "                Username: admin"
            echo "                Password: (from secret GRAFANA_ADMIN_PASSWORD)"
          else
            echo "  Prometheus:   kubectl port-forward -n monitoring svc/kube-prometheus-stack-prometheus 9090:9090"
            echo "                http://localhost:9090"
            echo ""
            echo "  Grafana:      kubectl port-forward -n monitoring svc/kube-prometheus-stack-grafana 3000:80"
            echo "                http://localhost:3000"
            echo "                Username: admin"
            echo "                Password: (from secret GRAFANA_ADMIN_PASSWORD)"
            echo ""
            echo "  Alertmanager: kubectl port-forward -n monitoring svc/kube-prometheus-stack-alertmanager 9093:9093"
            echo "                http://localhost:9093"
          fi
          echo ""
          echo "============================================="
      
      - name: Apply Namespace
        run: kubectl apply -f kubernetes/namespace.yaml
      
      - name: Apply ConfigMap
        run: |
          DB_IP=$(jq -r '.db_private_ip.value' outputs.json)
          NFS_IP=$(jq -r '.db_private_ip.value' outputs.json)
          
          cat kubernetes/configmap.yaml | \
            sed "s|PLACEHOLDER_DB_HOST|${DB_IP}|g" | \
            sed "s|PLACEHOLDER_NFS_SERVER|${NFS_IP}|g" | \
            kubectl apply -f -
      
      - name: Apply Secrets
        run: |
          cat kubernetes/secrets.yaml | \
            sed "s|PLACEHOLDER_DB_PASSWORD|${{ secrets.DB_PASSWORD }}|g" | \
            kubectl apply -f -
      
      - name: Apply NFS PersistentVolume
        run: |
          NFS_IP=$(jq -r '.db_private_ip.value' outputs.json)
          
          cat kubernetes/nfs-pv.yaml | \
            sed "s|PLACEHOLDER_NFS_SERVER|${NFS_IP}|g" | \
            kubectl apply -f -
      
      - name: Wait for PVC to be Bound
        run: |
          kubectl wait --for=jsonpath='{.status.phase}'=Bound \
            pvc/nfs-uploads-pvc -n productx --timeout=60s || true
      
      - name: Apply Services
        run: |
          kubectl apply -f kubernetes/base/backend/service.yaml
          kubectl apply -f kubernetes/base/frontend/service.yaml
      
      - name: Apply HPA
        run: |
          kubectl apply -f kubernetes/base/backend/hpa.yaml
          kubectl apply -f kubernetes/base/frontend/hpa.yaml
      
      - name: Apply Production Ingress
        run: |
          PROD_CERT_ARN=$(jq -r '.production_certificate_arn.value // "N/A"' outputs.json)
          
          if [ "$PROD_CERT_ARN" != "N/A" ] && [ -n "${{ secrets.DOMAIN_NAME }}" ]; then
            echo "✅ HTTPS enabled for Production"
            cat kubernetes/ingress.yaml | \
              sed "s|PRODUCTION_CERTIFICATE_ARN|${PROD_CERT_ARN}|g" | \
              sed "s|PLACEHOLDER_DOMAIN|${{ secrets.DOMAIN_NAME }}|g" | \
              kubectl apply -f -
          else
            echo "⚠️ HTTP-only mode for Production"
            cat kubernetes/ingress.yaml | \
              sed '/certificate-arn/d' | \
              sed "s|listen-ports.*|listen-ports: '[{\"HTTP\": 80}]'|g" | \
              sed '/ssl-redirect/d' | \
              sed "s|PLACEHOLDER_DOMAIN|${{ secrets.DOMAIN_NAME }}|g" | \
              kubectl apply -f -
          fi
      
      - name: Apply Staging Ingress
        run: |
          STAGING_CERT_ARN=$(jq -r '.staging_certificate_arn.value // "N/A"' outputs.json)
          
          if [ "$STAGING_CERT_ARN" != "N/A" ] && [ -n "${{ secrets.DOMAIN_NAME }}" ]; then
            echo "✅ Applying Staging Ingress with HTTPS"
            cat kubernetes/ingress-staging.yaml | \
              sed "s|STAGING_CERTIFICATE_ARN|${STAGING_CERT_ARN}|g" | \
              sed "s|PLACEHOLDER_DOMAIN|${{ secrets.DOMAIN_NAME }}|g" | \
              kubectl apply -f -
          else
            echo "⚠️ Applying Staging Ingress (HTTP-only mode)"
            cat kubernetes/ingress-staging.yaml | \
              sed '/certificate-arn/d' | \
              sed "s|listen-ports.*|listen-ports: '[{\"HTTP\": 80}]'|g" | \
              sed '/ssl-redirect/d' | \
              sed "s|PLACEHOLDER_DOMAIN|${{ secrets.DOMAIN_NAME }}|g" | \
              kubectl apply -f -
          fi
      
      - name: Apply Monitoring Ingress (Grafana)
        run: |
          MONITORING_CERT_ARN=$(jq -r '.monitoring_certificate_arn.value // "N/A"' outputs.json)
          
          if [ "$MONITORING_CERT_ARN" != "N/A" ] && [ -n "${{ secrets.DOMAIN_NAME }}" ]; then
            echo "✅ Applying Monitoring Ingress with HTTPS"
            cat kubernetes/ingress-monitoring.yaml | \
              sed "s|MONITORING_CERTIFICATE_ARN|${MONITORING_CERT_ARN}|g" | \
              sed "s|PLACEHOLDER_DOMAIN|${{ secrets.DOMAIN_NAME }}|g" | \
              kubectl apply -f -
          else
            echo "⚠️ Applying Monitoring Ingress (HTTP-only mode)"
            # Fallback to old grafana-ingress.yaml if exists
            if [ -f kubernetes/monitoring/grafana-ingress.yaml ]; then
              cat kubernetes/monitoring/grafana-ingress.yaml | \
                sed '/certificate-arn/d' | \
                sed "s|listen-ports.*|listen-ports: '[{\"HTTP\": 80}]'|g" | \
                sed '/ssl-redirect/d' | \
                sed "s|PLACEHOLDER_DOMAIN|${{ secrets.DOMAIN_NAME }}|g" | \
                kubectl apply -f -
            else
              echo "⚠️ Monitoring ingress file not found, skipping"
            fi
          fi
      
      - name: Verify Resources
        run: |
          echo "📊 Kubernetes Resources Status:"
          kubectl get all -n productx
          kubectl get pv,pvc -n productx
          kubectl get ingress -n productx

  # ===========================================================================
  # JOB 6: TERRAFORM DESTROY (with strict safeguards)
  # ===========================================================================
  terraform-destroy:
    name: Terraform Destroy
    runs-on: ubuntu-latest
    if: |
      github.event.inputs.action == 'destroy' &&
      github.event.inputs.confirm_destroy == 'DESTROY'
    
    environment:
      name: production-infrastructure
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      
      - name: Configure kubectl
        run: |
          aws eks update-kubeconfig \
            --name ${{ secrets.EKS_CLUSTER_NAME }} \
            --region ${{ env.AWS_REGION }} || true
      
      - name: Pre-Destroy Warning
        run: |
          echo "⚠️⚠️⚠️ DESTROYING INFRASTRUCTURE ⚠️⚠️⚠️"
          echo ""
          echo "This will DELETE:"
          echo "  - EKS Cluster: ${{ secrets.EKS_CLUSTER_NAME }}"
          echo "  - EC2 Instances (DB + NFS)"
          echo "  - VPC and all networking"
          echo "  - All data and configurations"
          echo ""
          echo "Waiting 30 seconds for final cancellation..."
          sleep 30
      
      - name: Cleanup Kubernetes Resources
        run: |
          echo "🧹 Step 1: Deleting Kubernetes resources..."
          
          if kubectl cluster-info &>/dev/null; then
            echo "  Deleting Ingress (triggers ALB deletion)..."
            kubectl delete ingress --all -n productx 2>/dev/null || true
            
            echo "  Deleting LoadBalancer services..."
            kubectl delete svc --all -n productx 2>/dev/null || true
            
            echo "  Deleting AWS Load Balancer Controller..."
            helm uninstall aws-load-balancer-controller -n kube-system 2>/dev/null || true
            
            echo "✅ Kubernetes resources deleted"
            echo "⏳ Waiting 60 seconds for ALB deletion..."
            sleep 60
          else
            echo "⚠️ kubectl not configured, skipping Kubernetes cleanup"
          fi
      
      - name: Force Delete ALBs
        run: |
          echo "🧹 Step 2: Force deleting ALBs..."
          
          ALB_ARNS=$(aws elbv2 describe-load-balancers --region ${{ env.AWS_REGION }} \
            --query "LoadBalancers[?contains(LoadBalancerName, 'k8s-productx')].LoadBalancerArn" \
            --output text 2>/dev/null || echo "")
          
          if [ -z "$ALB_ARNS" ]; then
            echo "✅ No ALBs found"
          else
            for arn in $ALB_ARNS; do
              echo "  Deleting: $arn"
              aws elbv2 delete-load-balancer --load-balancer-arn "$arn" --region ${{ env.AWS_REGION }} 2>/dev/null || true
            done
            echo "✅ ALB deletion triggered"
            echo "⏳ Waiting 120 seconds for ALB cleanup..."
            sleep 120
          fi
      
      - name: Cleanup Security Groups
        run: |
          echo "🧹 Step 3: Cleaning up Kubernetes Security Groups..."
          
          VPC_ID=$(aws ec2 describe-vpcs --region ${{ env.AWS_REGION }} \
            --filters "Name=tag:Name,Values=productx-vpc" \
            --query "Vpcs[0].VpcId" --output text 2>/dev/null || echo "")
          
          if [ -z "$VPC_ID" ] || [ "$VPC_ID" == "None" ]; then
            echo "⚠️ VPC not found"
          else
            echo "Found VPC: $VPC_ID"
            
            # Get all non-default SGs
            SG_IDS=$(aws ec2 describe-security-groups --region ${{ env.AWS_REGION }} \
              --filters "Name=vpc-id,Values=$VPC_ID" \
              --query "SecurityGroups[?GroupName!='default'].GroupId" \
              --output text 2>/dev/null || echo "")
            
            if [ -z "$SG_IDS" ]; then
              echo "✅ No Security Groups to clean"
            else
              echo "  Removing all rules to break dependencies..."
              for SG_ID in $SG_IDS; do
                # Revoke all ingress rules
                INGRESS=$(aws ec2 describe-security-groups --region ${{ env.AWS_REGION }} --group-ids $SG_ID \
                  --query "SecurityGroups[0].IpPermissions" --output json 2>/dev/null || echo "[]")
                
                if [ "$INGRESS" != "[]" ] && [ "$INGRESS" != "null" ]; then
                  echo "$INGRESS" > /tmp/ing-$SG_ID.json
                  aws ec2 revoke-security-group-ingress --region ${{ env.AWS_REGION }} \
                    --group-id $SG_ID --ip-permissions file:///tmp/ing-$SG_ID.json 2>/dev/null || true
                  rm -f /tmp/ing-$SG_ID.json
                fi
                
                # Revoke all egress rules
                EGRESS=$(aws ec2 describe-security-groups --region ${{ env.AWS_REGION }} --group-ids $SG_ID \
                  --query "SecurityGroups[0].IpPermissionsEgress" --output json 2>/dev/null || echo "[]")
                
                if [ "$EGRESS" != "[]" ] && [ "$EGRESS" != "null" ]; then
                  echo "$EGRESS" > /tmp/eg-$SG_ID.json
                  aws ec2 revoke-security-group-egress --region ${{ env.AWS_REGION }} \
                    --group-id $SG_ID --ip-permissions file:///tmp/eg-$SG_ID.json 2>/dev/null || true
                  rm -f /tmp/eg-$SG_ID.json
                fi
              done
              
              sleep 10
              
              echo "  Deleting Kubernetes Security Groups..."
              for SG_ID in $SG_IDS; do
                SG_NAME=$(aws ec2 describe-security-groups --region ${{ env.AWS_REGION }} --group-ids $SG_ID \
                  --query "SecurityGroups[0].GroupName" --output text 2>/dev/null || echo "")
                
                # Check if it's a Kubernetes SG
                IS_K8S_SG=false
                if [[ "$SG_NAME" == k8s-traffic-* ]]; then
                  IS_K8S_SG=true
                fi
                
                # Check for ALB tag
                HAS_ALB_TAG=$(aws ec2 describe-security-groups --region ${{ env.AWS_REGION }} --group-ids $SG_ID \
                  --query "SecurityGroups[0].Tags[?Key=='elbv2.k8s.aws/cluster'].Value" \
                  --output text 2>/dev/null || echo "")
                if [ ! -z "$HAS_ALB_TAG" ]; then
                  IS_K8S_SG=true
                fi
                
                if [ "$IS_K8S_SG" = true ]; then
                  echo "    Deleting Kubernetes SG: $SG_ID ($SG_NAME)"
                  aws ec2 delete-security-group --region ${{ env.AWS_REGION }} --group-id $SG_ID 2>/dev/null && {
                    echo "      ✅ Deleted"
                  } || {
                    echo "      ⚠️ Cannot delete (will retry)"
                  }
                else
                  echo "    Skipping Terraform SG: $SG_ID ($SG_NAME)"
                fi
              done
              
              # Final retry for stubborn SGs
              echo "  Final retry - deleting remaining non-default SGs..."
              sleep 15
              
              REMAINING_SGS=$(aws ec2 describe-security-groups --region ${{ env.AWS_REGION }} \
                --filters "Name=vpc-id,Values=$VPC_ID" \
                --query "SecurityGroups[?GroupName!='default'].GroupId" \
                --output text 2>/dev/null || echo "")
              
              for SG_ID in $REMAINING_SGS; do
                SG_NAME=$(aws ec2 describe-security-groups --region ${{ env.AWS_REGION }} --group-ids $SG_ID \
                  --query "SecurityGroups[0].GroupName" --output text 2>/dev/null || echo "")
                
                if [ "$SG_NAME" != "default" ]; then
                  echo "    Attempting to delete: $SG_ID ($SG_NAME)"
                  aws ec2 delete-security-group --region ${{ env.AWS_REGION }} --group-id $SG_ID 2>/dev/null && {
                    echo "      ✅ Deleted"
                  } || {
                    echo "      ⚠️ Still has dependencies (Terraform will handle)"
                  }
                fi
              done
              
              echo "✅ Security Groups cleanup completed"
            fi
          fi
      
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      
      - name: Configure Backend with Secret
        working-directory: terraform
        run: |
          if [ -n "${{ secrets.TF_BACKEND_BUCKET }}" ]; then
            echo "✅ Using backend bucket from secret: ${{ secrets.TF_BACKEND_BUCKET }}"
            sed -i 's/productx-tfstate-REPLACE_ME/${{ secrets.TF_BACKEND_BUCKET }}/g' backend.tf
          else
            echo "⚠️ TF_BACKEND_BUCKET secret not set!"
            exit 1
          fi
      
      - name: Terraform Init
        working-directory: terraform
        run: terraform init
      
      - name: Terraform Destroy
        working-directory: terraform
        run: |
          if [ -n "${{ secrets.DOMAIN_NAME }}" ]; then
            ENABLE_HTTPS="true"
          else
            ENABLE_HTTPS="false"
          fi
          
          terraform destroy -auto-approve -no-color \
            -var="key_name=${{ secrets.AWS_KEY_NAME }}" \
            -var="domain_name=${{ secrets.DOMAIN_NAME }}" \
            -var="enable_https=${ENABLE_HTTPS}"
      
      - name: Destroy Complete
        run: |
          echo "============================================="
          echo "✅ INFRASTRUCTURE DESTROYED"
          echo "============================================="
          echo ""
          echo "Deleted resources:"
          echo "  ✅ EKS Cluster"
          echo "  ✅ EC2 Instances"
          echo "  ✅ VPC and Networking"
          echo "  ✅ Security Groups"
          echo "  ✅ Load Balancers"
          echo ""
          echo "⚠️ Manual cleanup may be needed for:"
          echo "  - S3 Terraform state bucket"
          echo "  - DynamoDB state lock table"
          echo "  - ACM certificates"
          echo "  - CloudWatch log groups"
          echo ""
          echo "Run cleanup scripts if needed:"
          echo "  ./cleanup-failed-resources.sh"
          echo "  ./full-cleanup.sh"
          echo "============================================="
