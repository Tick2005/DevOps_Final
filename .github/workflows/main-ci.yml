# =============================================================================
# MAIN-CI.YML - CI Pipeline cho main branch
# =============================================================================
# Trigger: Push hoặc PR vào main branch
# Actions: Build, Test, SonarCloud Analysis, Build Docker Images
# =============================================================================

name: Main CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}

jobs:
  # =============================================================================
  # JOB 1: Backend CI
  # =============================================================================
  backend-ci:
    name: Backend Build & Test
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Cần cho SonarCloud

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        working-directory: ./app/backend/common
        run: mvn clean package -DskipTests

      - name: Run tests
        working-directory: ./app/backend/common
        run: mvn test

      - name: SonarCloud Scan
        working-directory: ./app/backend/common
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          mvn sonar:sonar \
            -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }} \
            -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }} \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.token=${{ secrets.SONAR_TOKEN }}

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: app/backend/common/target/*.jar
          retention-days: 1

  # =============================================================================
  # JOB 2: Frontend CI
  # =============================================================================
  frontend-ci:
    name: Frontend Build & Test
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app/frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./app/frontend
        run: npm ci

      - name: Build frontend
        working-directory: ./app/frontend
        run: npm run build

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: app/frontend/dist
          retention-days: 1

  # =============================================================================
  # JOB 3: Build Docker Images (chỉ khi push vào main)
  # =============================================================================
  build-docker:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [backend-ci, frontend-ci]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Generate image tag
        id: tag
        run: echo "IMAGE_TAG=$(date +%Y%m%d-%H%M%S)-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./app/backend/common
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/productx-backend:${{ steps.tag.outputs.IMAGE_TAG }}
            ${{ secrets.DOCKER_USERNAME }}/productx-backend:latest
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/productx-backend:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/productx-backend:buildcache,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./app/frontend
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/productx-frontend:${{ steps.tag.outputs.IMAGE_TAG }}
            ${{ secrets.DOCKER_USERNAME }}/productx-frontend:latest
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/productx-frontend:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/productx-frontend:buildcache,mode=max

      - name: Save image tag for CD
        run: echo "${{ steps.tag.outputs.IMAGE_TAG }}" > image-tag.txt

      - name: Upload image tag artifact
        uses: actions/upload-artifact@v4
        with:
          name: image-tag
          path: image-tag.txt
          retention-days: 7
