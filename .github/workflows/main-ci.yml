# =============================================================================
# MAIN-CI.YML - Build & Release Docker Images for ProductX
# =============================================================================
# Trigger: Khi code được merge/push vào nhánh main (CHỈ KHI SỬA app/**)
# Manual trigger note: update to force a fresh GitHub Actions run.
# =============================================================================

name: Build & Release Docker

on:
  push:
    branches:
      - main
    paths:
      - 'app/**'
      - '.github/workflows/main-ci.yml'

concurrency:
  group: main-${{ github.sha }}
  cancel-in-progress: true

env:
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}

jobs:
  # ===========================================================================
  # JOB 0: WAIT FOR INFRASTRUCTURE
  # ===========================================================================
  wait-for-infrastructure:
    name: Wait for Infrastructure
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      - name: Check Infrastructure Workflow Status
        run: |
          echo "🔍 Checking if infrastructure workflow is running..."
          
          INFRA_RUN=$(gh api repos/${{ github.repository }}/actions/workflows/infrastructure-cd.yml/runs \
            --jq ".workflow_runs[] | select(.head_sha==\"${{ github.sha }}\") | {id: .id, status: .status, conclusion: .conclusion}" \
            | head -n 1)
          
          if [ -z "$INFRA_RUN" ]; then
            echo "✅ No infrastructure workflow for this commit"
            exit 0
          fi
          
          INFRA_STATUS=$(echo $INFRA_RUN | jq -r '.status')
          INFRA_ID=$(echo $INFRA_RUN | jq -r '.id')
          
          if [ "$INFRA_STATUS" == "in_progress" ] || [ "$INFRA_STATUS" == "queued" ]; then
            echo "⏳ Infrastructure workflow đang chạy..."
            gh run watch $INFRA_ID --exit-status
            echo "✅ Infrastructure workflow hoàn thành!"
          fi
        env:
          GH_TOKEN: ${{ github.token }}
  
  # ===========================================================================
  # JOB 1: BUILD & PUSH BACKEND IMAGE
  # ===========================================================================
  build-backend:
    name: Build Backend Docker Image
    runs-on: ubuntu-latest
    needs: wait-for-infrastructure

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'
          cache-dependency-path: 'app/backend/common/pom.xml'

      - name: Build Application JAR
        working-directory: app/backend/common
        run: mvn clean package -DskipTests --batch-mode --no-transfer-progress

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract Docker Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_USERNAME }}/productx-backend
          tags: |
            type=sha,format=long
            type=sha,format=short

      - name: Build and Load Backend Image
        uses: docker/build-push-action@v6
        with:
          context: app/backend/common
          load: true
          tags: ${{ env.DOCKER_USERNAME }}/productx-backend:scan
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy Vulnerability Scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.DOCKER_USERNAME }}/productx-backend:scan
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL'
          ignore-unfixed: true

      - name: Push Backend Image to Docker Hub
        uses: docker/build-push-action@v6
        with:
          context: app/backend/common
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha

      - name: Print Backend Image Info
        run: |
          echo "============================================="
          echo "✅ Backend Docker Image Published!"
          echo "============================================="
          echo "Image: ${{ env.DOCKER_USERNAME }}/productx-backend"
          echo "Tags:"
          echo "${{ steps.meta.outputs.tags }}" | tr ',' '\n' | sed 's/^/   - /'
          echo "Commit: ${{ github.sha }}"
          echo "============================================="

  # ===========================================================================
  # JOB 2: BUILD & PUSH FRONTEND IMAGE
  # ===========================================================================
  build-frontend:
    name: Build Frontend Docker Image
    runs-on: ubuntu-latest
    needs: wait-for-infrastructure

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'app/frontend/package-lock.json'

      - name: Install Dependencies
        working-directory: app/frontend
        run: npm ci

      - name: Build Frontend
        working-directory: app/frontend
        run: npm run build

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract Docker Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_USERNAME }}/productx-frontend
          tags: |
            type=sha,format=long
            type=sha,format=short

      - name: Build and Load Frontend Image
        uses: docker/build-push-action@v6
        with:
          context: app/frontend
          load: true
          tags: ${{ env.DOCKER_USERNAME }}/productx-frontend:scan
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy Vulnerability Scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.DOCKER_USERNAME }}/productx-frontend:scan
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL'
          ignore-unfixed: true

      - name: Push Frontend Image to Docker Hub
        uses: docker/build-push-action@v6
        with:
          context: app/frontend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha

      - name: Print Frontend Image Info
        run: |
          echo "============================================="
          echo "✅ Frontend Docker Image Published!"
          echo "============================================="
          echo "Image: ${{ env.DOCKER_USERNAME }}/productx-frontend"
          echo "Tags:"
          echo "${{ steps.meta.outputs.tags }}" | tr ',' '\n' | sed 's/^/   - /'
          echo "Commit: ${{ github.sha }}"
          echo "============================================="
