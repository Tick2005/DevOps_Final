version: "3.9"

services:
  app:
    image: your-registry/final-app:${APP_VERSION}
    env_file:
      - .env
    restart: unless-stopped
    ports:
      - "3000:3000"

  reverse-proxy:
    image: nginx:1.27-alpine
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - app
    restart: unless-stopped
