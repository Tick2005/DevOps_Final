# =============================================================================
# NFS-SERVER.YML - Cài đặt NFS Server trên DB+NFS Server
# =============================================================================

---
- name: Setup NFS Server
  hosts: nfs_server
  become: yes
  gather_facts: yes

  vars:
    nfs_export_path: "/srv/nfs/uploads"
    nfs_export_path_staging: "/srv/nfs/staging/uploads"
    nfs_allowed_cidr: "10.0.0.0/16"

  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install NFS server packages
      apt:
        name:
          - nfs-kernel-server
          - nfs-common
        state: present

    - name: Create NFS export directory for production
      file:
        path: "{{ nfs_export_path }}"
        state: directory
        mode: '0777'
        owner: nobody
        group: nogroup

    - name: Create NFS export directory for staging
      file:
        path: "{{ nfs_export_path_staging }}"
        state: directory
        mode: '0777'
        owner: nobody
        group: nogroup

    - name: Configure NFS exports for production
      lineinfile:
        path: /etc/exports
        line: "{{ nfs_export_path }} {{ nfs_allowed_cidr }}(rw,sync,no_subtree_check,no_root_squash)"
        state: present
      notify: reload nfs exports

    - name: Configure NFS exports for staging
      lineinfile:
        path: /etc/exports
        line: "{{ nfs_export_path_staging }} {{ nfs_allowed_cidr }}(rw,sync,no_subtree_check,no_root_squash)"
        state: present
      notify: reload nfs exports

    - name: Ensure NFS server is running
      systemd:
        name: nfs-kernel-server
        state: started
        enabled: yes

    - name: Apply NFS exports
      command: exportfs -ra

    - name: Verify NFS exports
      command: exportfs -v
      register: nfs_exports
      changed_when: false

    - name: Display NFS server info
      debug:
        msg: |
          ============================================
          📁 NFS SERVER READY!
          ============================================
          Private IP: {{ ansible_default_ipv4.address }}
          Allowed Network: {{ nfs_allowed_cidr }}
          
          🟢 PRODUCTION:
          Export Path: {{ nfs_export_path }}
          Mount: {{ ansible_default_ipv4.address }}:{{ nfs_export_path }}
          
          🟡 STAGING:
          Export Path: {{ nfs_export_path_staging }}
          Mount: {{ ansible_default_ipv4.address }}:{{ nfs_export_path_staging }}
          
          NFS Exports:
          {{ nfs_exports.stdout }}
          ============================================

  handlers:
    - name: reload nfs exports
      command: exportfs -ra
