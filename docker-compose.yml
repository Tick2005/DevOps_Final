services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: startupx
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./app/backend/common
    restart: unless-stopped
    environment:
      PORT: 8080
      MONGODB_URI: mongodb://mongo:27017/startupx
      APP_TIER: docker-compose-fullstack
    ports:
      - "8080:8080"
    depends_on:
      mongo:
        condition: service_healthy

  frontend:
    build:
      context: ./app/frontend
    restart: unless-stopped
    environment:
      VITE_PROXY_TARGET: http://backend:8080
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  mongo_data: