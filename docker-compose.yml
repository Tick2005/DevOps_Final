services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: productx_db
      POSTGRES_USER: productx_user
      POSTGRES_PASSWORD: SecurePassword123!
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U productx_user -d productx_db"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./app/backend/common
    restart: unless-stopped
    environment:
      PORT: 8080
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/productx_db
      SPRING_DATASOURCE_USERNAME: productx_user
      SPRING_DATASOURCE_PASSWORD: SecurePassword123!
      APP_TIER: docker-compose-fullstack
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./app/frontend
    restart: unless-stopped
    environment:
      VITE_PROXY_TARGET: http://backend:8080
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data: