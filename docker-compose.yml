services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: productdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./app/backend/common
    restart: unless-stopped
    environment:
      PORT: 8080
      DATABASE_URL: jdbc:postgresql://postgres:5432/productdb
      DATABASE_USERNAME: postgres
      DATABASE_PASSWORD: postgres
      APP_TIER: docker-compose-fullstack
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./app/frontend
    restart: unless-stopped
    environment:
      VITE_PROXY_TARGET: http://backend:8080
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data: