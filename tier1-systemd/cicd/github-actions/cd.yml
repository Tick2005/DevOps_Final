name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: app-artifact
        continue-on-error: true

      - name: Deploy (systemd or pm2)
        run: |
          chmod +x tier1-systemd/deployment/deploy-systemd.sh
          tier1-systemd/deployment/deploy-systemd.sh
