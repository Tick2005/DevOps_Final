name: CI

on:
  push:
    branches: ["dev", "main"]
  pull_request:

env:
  BUILD_CONTAINER: "false"

jobs:
  lint_build_security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "tier1-systemd/backend/package-lock.json"

      - name: Install dependencies
        run: |
          cd tier1-systemd/backend
          npm ci

      - name: Lint
        run: |
          cd tier1-systemd/backend
          npm run lint --if-present

      - name: Build artifact
        run: |
          cd tier1-systemd/backend
          npm run build --if-present
          tar -czf app-artifact.tgz .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-artifact
          path: app-artifact.tgz

      - name: Security scan (Trivy filesystem)
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: fs
          scan-ref: "tier1-systemd/backend"
          severity: HIGH,CRITICAL
          exit-code: "1"

  build_and_push_image:
    if: env.BUILD_CONTAINER == 'true'
    runs-on: ubuntu-latest
    needs: lint_build_security
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image tag
        id: vars
        run: echo "tag=${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Docker login
        run: echo "Set registry login here"

      - name: Build image
        run: |
          docker build -t your-registry/final-app:${{ steps.vars.outputs.tag }} tier1-systemd/backend

      - name: Push image
        run: |
          docker push your-registry/final-app:${{ steps.vars.outputs.tag }}
