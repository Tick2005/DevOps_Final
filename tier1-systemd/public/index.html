<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Redirecting to Tier 2 UI</title>
</head>
<body>
  <p>Redirecting to shared UI...</p>
  <script>
    const target = "../../tier2-docker-compose/public/index.html";
    const params = new URLSearchParams(window.location.search);
    if (!params.get("tier")) params.set("tier", "tier1-systemd");
    if (!params.get("stack")) params.set("stack", "Systemd or PM2");
    window.location.replace(`${target}?${params.toString()}`);
  </script>
</body>
</html>
