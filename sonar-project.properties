# =============================================================================
# SONAR-PROJECT.PROPERTIES - SonarCloud Configuration
# =============================================================================
# File này dùng cho SonarCloud analysis
# =============================================================================

# Project identification
sonar.projectKey=${SONAR_PROJECT_KEY}
sonar.organization=${SONAR_ORGANIZATION}

# Project metadata
sonar.projectName=ProductX Management System
sonar.projectVersion=1.0

# Source code location
sonar.sources=app/backend/common/src/main/java,app/frontend/src
sonar.tests=app/backend/common/src/test/java

# Java specific
sonar.java.source=17
sonar.java.binaries=app/backend/common/target/classes

# JavaScript/TypeScript specific
sonar.javascript.lcov.reportPaths=app/frontend/coverage/lcov.info

# Exclusions
sonar.exclusions=**/node_modules/**,**/target/**,**/dist/**,**/*.test.js,**/*.test.jsx

# Coverage exclusions
sonar.coverage.exclusions=**/*.test.js,**/*.test.jsx,**/test/**

# Encoding
sonar.sourceEncoding=UTF-8
