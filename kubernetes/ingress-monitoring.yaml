# =============================================================================
# INGRESS-MONITORING.YAML - Monitoring (Grafana) Ingress with Dedicated ALB
# =============================================================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: monitoring-ingress
  namespace: monitoring
  annotations:
    # ALB Configuration - Separate ALB for Monitoring
    alb.ingress.kubernetes.io/group.name: productx-monitoring-alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    
    # Listeners: HTTP and HTTPS
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS": 443}]'
    
    # ACM Certificate ARN for Monitoring - Will be replaced by workflow
    alb.ingress.kubernetes.io/certificate-arn: MONITORING_CERTIFICATE_ARN
    
    # SSL Policy
    alb.ingress.kubernetes.io/ssl-policy: ELBSecurityPolicy-TLS13-1-2-2021-06
    
    # SSL Redirect Action - Redirect HTTP to HTTPS
    alb.ingress.kubernetes.io/actions.ssl-redirect: |
      {
        "Type": "redirect",
        "RedirectConfig": {
          "Protocol": "HTTPS",
          "Port": "443",
          "StatusCode": "HTTP_301"
        }
      }
    
    # Health check configuration for Grafana
    alb.ingress.kubernetes.io/healthcheck-path: /api/health
    alb.ingress.kubernetes.io/healthcheck-protocol: HTTP
    alb.ingress.kubernetes.io/healthcheck-interval-seconds: '30'
    alb.ingress.kubernetes.io/healthcheck-timeout-seconds: '5'
    alb.ingress.kubernetes.io/healthy-threshold-count: '2'
    alb.ingress.kubernetes.io/unhealthy-threshold-count: '3'
    
    # Backend protocol
    alb.ingress.kubernetes.io/backend-protocol: HTTP
    
    # Tags for Monitoring ALB
    alb.ingress.kubernetes.io/tags: Environment=production,Purpose=monitoring

spec:
  ingressClassName: alb
  rules:
    # Monitoring domain - handles HTTPS traffic to Grafana
    - host: monitoring.PLACEHOLDER_DOMAIN
      http:
        paths:
          # Grafana - root path
          - path: /
            pathType: Prefix
            backend:
              service:
                name: kube-prometheus-stack-grafana
                port:
                  number: 80
    
    # Redirect rule for HTTP traffic
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ssl-redirect
                port:
                  name: use-annotation
