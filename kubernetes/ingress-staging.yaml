# =============================================================================
# INGRESS-STAGING.YAML - Staging Environment Ingress with Dedicated ALB
# =============================================================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: staging-ingress
  namespace: productx-staging
  annotations:
    # ALB Configuration - Separate ALB for Staging
    alb.ingress.kubernetes.io/group.name: productx-staging-alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    
    # Listeners: HTTP and HTTPS
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS": 443}]'
    
    # ACM Certificate ARN for Staging - Will be replaced by workflow
    alb.ingress.kubernetes.io/certificate-arn: STAGING_CERTIFICATE_ARN
    
    # SSL Policy
    alb.ingress.kubernetes.io/ssl-policy: ELBSecurityPolicy-TLS13-1-2-2021-06
    
    # SSL Redirect Action - Redirect HTTP to HTTPS
    alb.ingress.kubernetes.io/actions.ssl-redirect: |
      {
        "Type": "redirect",
        "RedirectConfig": {
          "Protocol": "HTTPS",
          "Port": "443",
          "StatusCode": "HTTP_301"
        }
      }
    
    # Health check configuration
    alb.ingress.kubernetes.io/healthcheck-protocol: HTTP
    alb.ingress.kubernetes.io/healthcheck-interval-seconds: '15'
    alb.ingress.kubernetes.io/healthcheck-timeout-seconds: '5'
    alb.ingress.kubernetes.io/healthy-threshold-count: '2'
    alb.ingress.kubernetes.io/unhealthy-threshold-count: '2'
    
    # Backend protocol
    alb.ingress.kubernetes.io/backend-protocol: HTTP
    
    # Tags for Staging ALB
    alb.ingress.kubernetes.io/tags: Environment=staging,Purpose=staging-app

spec:
  ingressClassName: alb
  rules:
    # Staging domain - handles HTTPS traffic
    - host: staging.PLACEHOLDER_DOMAIN
      http:
        paths:
          # Frontend - root path
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-svc
                port:
                  number: 80
          
          # Backend API - /api path
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend-svc
                port:
                  number: 8080
    
    # Redirect rule for HTTP traffic
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ssl-redirect
                port:
                  name: use-annotation
