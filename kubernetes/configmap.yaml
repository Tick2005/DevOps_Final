# =============================================================================
# CONFIGMAP.YAML - Environment variables (non-sensitive)
# =============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: productx
data:
  # Database Configuration
  POSTGRES_DB: "productx_db"
  POSTGRES_USER: "productx_user"
  DB_HOST: "PLACEHOLDER_DB_HOST"
  
  # Spring Boot Configuration
  SPRING_DATASOURCE_URL: "jdbc:postgresql://PLACEHOLDER_DB_HOST:5432/productx_db"
  SPRING_DATASOURCE_USERNAME: "productx_user"
  SPRING_JPA_HIBERNATE_DDL_AUTO: "update"
  SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT: "org.hibernate.dialect.PostgreSQLDialect"
  
  # Application Configuration
  APP_TIER: "kubernetes-production"
  
  # NFS Server
  NFS_SERVER: "PLACEHOLDER_NFS_SERVER"
