# =============================================================================
# CONFIGMAP.YAML - Environment variables for ProductX
# =============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: productx
data:
  # External Database (EC2 standalone)
  POSTGRES_DB: "productx_db"
  POSTGRES_USER: "productx_user"
  DB_HOST: "PLACEHOLDER_DB_HOST"  # Sẽ được thay thế bởi CI/CD với DATA_SERVER_IP
  
  # Spring Boot - Connect to external PostgreSQL
  SPRING_DATASOURCE_URL: "jdbc:postgresql://PLACEHOLDER_DB_HOST:5432/productx_db"
  SPRING_DATASOURCE_USERNAME: "productx_user"
  SPRING_JPA_HIBERNATE_DDL_AUTO: "update"
  SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT: "org.hibernate.dialect.PostgreSQLDialect"
  SPRING_JPA_SHOW_SQL: "false"
  
  # NFS Server
  NFS_SERVER: "PLACEHOLDER_NFS_SERVER"  # Sẽ được thay thế bởi CI/CD với DATA_SERVER_IP
