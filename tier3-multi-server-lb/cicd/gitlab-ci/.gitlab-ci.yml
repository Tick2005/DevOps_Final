stages:
  - lint
  - build
  - security
  - container
  - deploy

variables:
  BUILD_CONTAINER: "false"

lint:
  stage: lint
  image: node:20
  script:
    - cd tier3-multi-server-lb/backend
    - npm ci
    - npm run lint --if-present

build:
  stage: build
  image: node:20
  cache:
    key: "${CI_COMMIT_REF_SLUG}"
    paths:
      - tier3-multi-server-lb/backend/node_modules/
  script:
    - cd tier3-multi-server-lb/backend
    - npm run build --if-present
    - tar -czf app-artifact.tgz .
  artifacts:
    paths:
      - app-artifact.tgz

security_scan:
  stage: security
  image:
    name: aquasec/trivy:latest
    entrypoint: [""]
  script:
    - trivy fs --exit-code 1 --severity HIGH,CRITICAL tier3-multi-server-lb/backend

build_push_image:
  stage: container
  image: docker:27
  services:
    - docker:27-dind
  rules:
    - if: '$BUILD_CONTAINER == "true"'
  script:
    - export IMAGE_TAG="${CI_COMMIT_SHA}"
    - echo "Set registry login here"
    - docker build -t your-registry/final-app:${IMAGE_TAG} tier3-multi-server-lb/backend
    - docker push your-registry/final-app:${IMAGE_TAG}

deploy:
  stage: deploy
  script:
    - chmod +x tier3-multi-server-lb/deployment/app-node-deploy.sh
    - tier3-multi-server-lb/deployment/app-node-deploy.sh
