version: "3.9"

services:
  app:
    image: your-registry/final-app:${APP_VERSION}
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure
    networks:
      - app-net

  proxy:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      - "443:443"
    deploy:
      replicas: 1
    networks:
      - app-net

networks:
  app-net:
    driver: overlay
