apiVersion: apps/v1
kind: Deployment
metadata:
  name: final-app
  namespace: final-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: final-app
  template:
    metadata:
      labels:
        app: final-app
    spec:
      containers:
        - name: app
          image: your-registry/final-app:0.1.0
          ports:
            - containerPort: 3000
